name: SDC CI — Validate Structure & Tools
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check directory structure
        run: |
          echo "=== Core directories ==="
          for dir in core tools agents orchestrator tenants observability promptfoo skills; do
            if [ -d "$dir" ]; then
              count=$(find "$dir" -type f 2>/dev/null | wc -l)
              echo "  ✅ $dir/ ($count files)"
            else
              echo "  ❌ $dir/ MISSING"
            fi
          done

      - name: Validate Tool Registry
        run: |
          if [ -f tools/registry.json ]; then
            echo "✅ tools/registry.json exists"
            python3 -c "
import json
with open('tools/registry.json') as f:
    d = json.load(f)
print(f'  {len(d[\"tools\"])} tools')
print(f'  {len(d[\"servers\"])} servers')
for s in d['servers']:
    print(f'    {s[\"name\"]}: {s[\"tool_count\"]} tools')
"
          else
            echo "❌ tools/registry.json MISSING"
            exit 1
          fi

      - name: Validate Agent Registry
        run: |
          if [ -f agents/registry.yaml ]; then
            echo "✅ agents/registry.yaml exists"
            python3 -c "
import yaml
with open('agents/registry.yaml') as f:
    d = yaml.safe_load(f)
agents = d.get('agents', [])
print(f'  {len(agents)} agents defined')
tenants = set(a['tenant'] for a in agents)
for t in sorted(tenants):
    count = sum(1 for a in agents if a['tenant'] == t)
    print(f'    {t}: {count} agents')
"
          else
            echo "❌ agents/registry.yaml MISSING"
            exit 1
          fi

      - name: Validate Agent Definition Files
        run: |
          missing=0
          python3 -c "
import yaml
with open('agents/registry.yaml') as f:
    d = yaml.safe_load(f)
for a in d.get('agents', []):
    path = f'agents/{a[\"tenant\"]}/{a[\"name\"]}.md'
    import os
    if not os.path.exists(path):
        print(f'  ❌ {path} MISSING')
        exit(1)
    else:
        print(f'  ✅ {path}')
" || missing=1
          exit $missing

      - name: Check MCP servers Python syntax
        run: |
          errors=0
          for f in mcp/servers/*_mcp.py; do
            if python3 -c "compile(open('$f').read(), '$f', 'exec')" 2>/dev/null; then
              echo "  ✅ $(basename $f)"
            else
              echo "  ❌ $(basename $f) — syntax error"
              errors=$((errors+1))
            fi
          done
          exit $errors

      - name: Validate opencode.json
        run: |
          python3 -c "
import json
with open('opencode.json') as f:
    d = json.load(f)
print(f'✅ opencode.json valid')
print(f'  Agents: {list(d.get(\"agent\",{}).keys())}')
print(f'  MCP servers: {list(d.get(\"mcp\",{}).keys())}')
print(f'  Commands: {len(d.get(\"command\",{}))}')
print(f'  Skills paths: {d.get(\"skills\",{}).get(\"paths\",[])}')
"

      - name: Install Python deps
        run: |
          pip install -r requirements.txt --quiet

      - name: Run unit tests
        run: |
          PYTHONPATH=. python3 -m pytest tests/ evals/ memory/tests/ -q --tb=short -x

      - name: Run structural evals
        run: |
          PYTHONPATH=. python3 -m pytest evals/test_evals.py -v --tb=short

      - name: Run lint
        run: |
          ruff check apps/ memory/ metrics/ scripts/ --quiet || echo "⚠️ Lint warnings (non-blocking)"

      - name: Install promptfoo
        run: |
          npm install -g promptfoo

      - name: Run promptfoo evals
        run: |
          cd promptfoo && promptfoo eval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        continue-on-error: true

      - name: Upload promptfoo results
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: promptfoo/results.json
        continue-on-error: true

      - name: Check promptfoo config
        run: |
          if [ -f promptfoo/promptfooconfig.yaml ]; then
            echo "✅ promptfoo config exists"
            grep -c "tests:" promptfoo/promptfooconfig.yaml && echo "  Has test cases"
          fi
