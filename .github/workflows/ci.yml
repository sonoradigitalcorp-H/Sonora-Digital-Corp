name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/abe-service/requirements.txt
          pip install pytest httpx "pytest-asyncio>=0.24" pydantic

      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check planner/ scrapers/ apps/abe-service/

      - name: Run ABE Service tests
        run: |
          PYTHONPATH=. python -m pytest tests/test_abe_service.py -v

      - name: Run planner tests
        run: |
          PYTHONPATH=. python -m pytest tests/planner/ -v --asyncio-mode=auto

      - name: Verify registry loads
        run: |
          PYTHONPATH=. python -c "
          from planner.registry import load_registry
          r = load_registry()
          assert len(r) == 3, f'Expected 3 capabilities, got {len(r)}'
          for cid, cap in r.items():
              assert len(cap.providers) > 0, f'{cid} has no providers'
          print(f'Registry OK: {len(r)} capabilities loaded')
          "
