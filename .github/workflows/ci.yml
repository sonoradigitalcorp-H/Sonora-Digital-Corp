name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npx prisma generate
      - run: npm run build
      - name: Python lint (ruff)
        run: |
          pip install ruff
          ruff check packages/agent-swarm-v2/ || true
