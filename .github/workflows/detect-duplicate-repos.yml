name: Detect — Repos duplicados

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    runs-on: self-hosted
    steps:
      - name: Escanear repos duplicados
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN_CEO }}
          TELEGRAM_CHAT_ID: ${{ secrets.CEO_CHAT_ID }}
        run: |
          PRIMARY="/home/mystic/sonora-digital-corp"
          PRIMARY_REMOTE=$(git -C "$PRIMARY" remote get-url origin 2>/dev/null)
          ALERTS=""
          for dir in $(find /home/mystic -maxdepth 3 -name ".git" -type d 2>/dev/null); do
            repo_dir=$(dirname "$dir")
            remote=$(git -C "$repo_dir" remote get-url origin 2>/dev/null)
            if [ "$remote" = "$PRIMARY_REMOTE" ] && [ "$repo_dir" != "$PRIMARY" ]; then
              AHEAD=$(git -C "$repo_dir" rev-list --count origin/main...HEAD 2>/dev/null || echo 0)
              DIRTY=$(git -C "$repo_dir" status --porcelain 2>/dev/null | wc -l)
              if [ "$AHEAD" -gt 0 ] || [ "$DIRTY" -gt 0 ]; then
                ALERTS="${ALERTS}⚠️ CLON: $repo_dir (ahead=$AHEAD, dirty=$DIRTY)
      "
              fi
            fi
          done
          if [ -n "$ALERTS" ]; then
            MSG="🔍 *Repos duplicados detectados*
          ${ALERTS}"
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "text=${MSG}" \
              -d "parse_mode=Markdown" || true
          fi
