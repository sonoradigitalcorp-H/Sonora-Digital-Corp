name: Docker Build & Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Create .env for CI
        run: cp .env.ci .env 2>/dev/null || echo "NEO4J_PASSWORD=ci" > .env

      - name: Build test image and run tests
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/jarvis/Dockerfile
          target: test
          load: true
          tags: jarvis-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run tests explicitly
        run: docker run --rm jarvis-test python3 -m pytest tests/unit/ -q --no-header

      - name: Build production images
        uses: docker/build-push-action@v4
        with:
          context: .
          file: infra/docker/jarvis/Dockerfile
          target: jarvis-webui
          load: true
          tags: sonora/jarvis-webui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
