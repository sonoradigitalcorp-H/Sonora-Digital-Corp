name: SSL Auto
on:
  workflow_dispatch:
    inputs:
      domain:
        description: "Domain to secure (e.g., client.mysite.com)"
        required: true
        type: string
      port:
        description: "Backend port (e.g., 3001)"
        required: false
        default: "3001"
        type: string
      email:
        description: "Email for Let's Encrypt"
        required: false
        default: "sonoradigitalcorp@gmail.com"
        type: string

jobs:
  ssl:
    runs-on: ubuntu-latest
    steps:
      - name: SSH into VPS and run certbot
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 149.56.46.173
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            DOMAIN="${{ inputs.domain }}"
            PORT="${{ inputs.port }}"
            EMAIL="${{ inputs.email }}"

            echo "=== SSL Auto: $DOMAIN → :$PORT ==="

            # 1. Get certificate
            sudo certbot certonly --nginx -d "$DOMAIN" \
              --non-interactive --agree-tos --email "$EMAIL" || {
              echo "Certbot failed. Check DNS and try again."
              exit 1
            }

            # 2. Generate nginx config
            CONF="/etc/nginx/sites-enabled/ssl-auto-${DOMAIN}.conf"
            sudo tee "$CONF" > /dev/null <<NGINX
server {
    listen 80;
    server_name $DOMAIN;
    return 301 https://\$host\$request_uri;
}
server {
    listen 443 ssl http2;
    server_name $DOMAIN;
    ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
    location / {
        proxy_pass http://127.0.0.1:$PORT;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
    }
}
NGINX

            # 3. Validate and reload
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ https://$DOMAIN → :$PORT"

      - name: Telegram notification
        uses: appleboy/telegram-action@master
        with:
          to: ${{ secrets.TELEGRAM_CHAT }}
          token: ${{ secrets.TELEGRAM_TOKEN }}
          message: |
            ✅ SSL activado: https://${{ inputs.domain }} → :${{ inputs.port }}
