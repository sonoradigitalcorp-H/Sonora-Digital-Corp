name: Sync VPS
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger VPS sync via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: 149.56.46.173
          username: ubuntu
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/ubuntu/sonora-digital-corp
            git pull origin main 2>&1
            echo "=== Pull complete ==="
            git log --oneline -3
            echo "=== Regenerating configs ==="
            python3 scripts/generate-configs.py 2>&1 || echo "generate-configs skipped"
            echo "=== Validating truth ==="
            python3 scripts/validate-truth.py 2>&1 || echo "truth-validation issues"
            echo "=== Restarting Guardian ==="
            sudo systemctl restart truth-guardian.service 2>&1 || echo "guardian restart skipped"
