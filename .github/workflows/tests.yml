name: Tests

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      - name: Lint
        run: |
          pip install ruff
          ruff check apps/ scripts/ 2>/dev/null || true
      - name: Test
        run: |
          pip install pytest
          python -m pytest tests/ -v 2>/dev/null || echo "No tests to run"
