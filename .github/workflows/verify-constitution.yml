name: Verify — Constitution integrity

on:
  push:
    paths:
      - 'sonora-enterprise-os/constitution/**'
  pull_request:
    paths:
      - 'sonora-enterprise-os/constitution/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verificar checksums de la constitución
        run: |
          cd sonora-enterprise-os/constitution
          if [ -f CHECKSUMS.sha256 ]; then
            sha256sum -c CHECKSUMS.sha256 --quiet || echo "❌ Constitution modificada sin actualizar checksums"
            sha256sum -c CHECKSUMS.sha256 --quiet && echo "✅ Constitution intacta"
          fi
