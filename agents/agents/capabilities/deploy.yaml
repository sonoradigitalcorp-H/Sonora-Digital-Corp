# Capability: Deploy
version: 1
domain: deploy
actions:
  - id: deploy.staging
    description: "Desplegar en staging"
    severity: warning
    constraints:
      - "tests deben pasar primero"
  - id: deploy.production
    description: "Desplegar en producción"
    severity: critical
    constraints:
      - "requiere approval humano"
      - "tests pasan"
      - "verify-gate pasa"
  - id: deploy.rollback
    description: "Revertir deploy"
    severity: critical
