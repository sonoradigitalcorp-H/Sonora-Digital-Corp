# Capability: Secrets
version: 1
domain: secrets
actions:
  - id: secrets.read
    description: "Leer secrets (descifrados)"
    severity: critical
  - id: secrets.encrypt
    description: "Cifrar con age"
    severity: warning
  - id: secrets.decrypt
    description: "Descifrar con age"
    severity: critical
  - id: secrets.rotate
    description: "Rotar secrets"
    severity: critical
