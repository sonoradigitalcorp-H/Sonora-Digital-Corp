# Auditor Policy — Read-only
version: 1
agent: auditor
policy: allow-specific
description: "Auditor solo lee — nunca escribe, nunca deploya"
capabilities:
  - "fs.read"
  - "git.read"
  - "secrets.read"
  - "network.fetch"
never:
  - "fs.write"
  - "fs.delete"
  - "git.write"
  - "git.push"
  - "docker.*"
  - "deploy.*"
