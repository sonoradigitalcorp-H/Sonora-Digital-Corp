# DevOps Policy — Infrastructure
version: 1
agent: devops
policy: allow-specific
description: "DevOps maneja infraestructura pero no deploya a producción solo"
capabilities:
  - "fs.read"
  - "git.read"
  - "docker.*"
  - "systemctl.*"
  - "network.proxy"
  - "deploy.staging"
never:
  - "deploy.production"
  - "secrets.decrypt"
  - "git.push"
