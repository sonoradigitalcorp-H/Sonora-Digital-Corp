# Capability: Docker
version: 1
domain: docker
actions:
  - id: docker.build
    description: "Construir imágenes Docker"
    severity: warning
    constraints:
      - "imagen debe tener Dockerfile"
      - "no --privileged flag"
  - id: docker.run
    description: "Ejecutar contenedores"
    severity: warning
    constraints:
      - "no -p 0.0.0.0: (solo 127.0.0.1)"
  - id: docker.stop
    description: "Detener contenedores"
    severity: warning
  - id: docker.exec
    description: "Ejecutar comandos en contenedor"
    severity: error
  - id: docker.logs
    description: "Leer logs de contenedor"
    severity: info
