# Capability: execution
# Permite gestionar cola de tareas, ejecutar operaciones, y retry
capability: execution
description: "Gestion de cola de tareas y ejecucion de operaciones"
operations:
  - name: queue.submit
    description: "Encolar una nueva tarea"
  - name: queue.status
    description: "Consultar estado de una tarea"
  - name: queue.cancel
    description: "Cancelar una tarea"
  - name: queue.list
    description: "Listar tareas por estado/agente"
  - name: queue.stats
    description: "Estadisticas de la cola"
  - name: execute.operation
    description: "Ejecutar una operacion en un agente"
  - name: execute.retry
    description: "Reintentar una tarea fallida"
