# Policy: evolution
# El agente evolution solo puede leer metricas, proponer mejoras, y simular
# No puede escribir codigo productivo, hacer deploy, o modificar configuracion directamente
agent: evolution

allow:
  - read.metrics
  - read.learned
  - write.proposals
  - simulate.change

deny:
  - write.code
  - deploy.*
  - git.push
  - systemctl.*
  - docker.*
  - secrets.*

notes: >
  Evolution puede generar PRs basados en cambios de configuracion,
  pero nunca mergear. La aprobacion humana es obligatoria para cambios
  que afecten servicios productivos.
