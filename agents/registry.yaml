agents:
  # ── SDC Core Agents ──
  - name: creator-agent
    tenant: sdc
    role: Build and deploy complete agent-native companies
    tools: [lovable_generate_page, hasura_query, hasura_mutate, upload_file, engram_save, omnivoice_clone]
    memory: engram_sdc
    channel: agent:creator
    triggers: [command:/crear-empresa, command:/agregar-artista]

  - name: quality-agent
    tenant: sdc
    role: Evaluate and certify prompts and pipelines
    tools: [llm_chat, engram_search, rag_search]
    memory: engram_sdc
    channel: agent:quality
    triggers: [event:system:pipeline:end, cron:sunday:12:00]

  - name: monitor-agent
    tenant: sdc
    role: System self-care and auto-repair
    tools: [engram_save, telegram_notify]
    memory: engram_sdc
    channel: agent:monitor
    triggers: [cron:*/5, event:system:alert]

  # ── ABE Music Agents ──
  - name: ceo-agent
    tenant: abe-music
    role: Business owner — revenue, KPIs, decisions
    tools: [hasura_query, engram_get, rag_search, llm_chat]
    memory: engram_abe_music
    channel: agent:ceo
    triggers: [command:/dashboard, command:/report]

  - name: marketing-agent
    tenant: abe-music
    role: Brand strategy, campaigns, trends
    tools: [rag_search, llm_chat, engram_save, firecrawl_crawl]
    memory: engram_abe_music
    channel: agent:marketing
    triggers: [cron:08:00, command:/campaña]

  - name: content-agent
    tenant: abe-music
    role: Daily content factory — videos, reels, podcasts
    tools: [rag_search, llm_chat, generate_video, export_video, tts_generate, whisper_transcribe, engram_save, upload_file]
    memory: engram_abe_music
    channel: agent:content
    triggers: [cron:06:00, command:/generar]

  - name: sales-agent
    tenant: abe-music
    role: Sell products, process payments, upsell
    tools: [stripe_create_checkout, stripe_create_payment, stripe_create_product, supabase_upload_file, upload_file, engram_save]
    memory: engram_abe_music
    channel: agent:sales
    triggers: [event:webhook:stripe, command:/vender]

  - name: support-agent
    tenant: abe-music
    role: Customer service, FAQ, issue resolution
    tools: [rag_search, engram_search, llm_chat, omnivoice_speak]
    memory: engram_abe_music
    channel: agent:support
    triggers: [event:ticket:new, command:/soporte]

  - name: voice-agent
    tenant: abe-music
    role: Voice interface for the smart app
    tools: [omnivoice_speak, omnivoice_clone, omnivoice_list_voices, whisper_transcribe, llm_chat, rag_search]
    memory: engram_abe_music
    channel: agent:voice
    triggers: [always:available:in-app]

  - name: clone-agent
    tenant: sdc
    role: Clone publicitario — entrenar LoRA facial + voz, generar contenido con identidad del cliente
    tools: [validate_photos, train_lora, check_face_quality, validate_audio, clone_voice, list_voices, generate_tts, gen_photo, gen_video, gen_tts, ffmpeg_convert, ffmpeg_assemble, ffmpeg_multiformat, create_pack, consume_credit, get_credits]
    memory: engram_sdc
    channel: agent:clone
    triggers: [command:/clonar, event:clone:client_registered, event:clone:photos_collected]
