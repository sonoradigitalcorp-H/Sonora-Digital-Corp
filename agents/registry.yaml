# Agent Registry — Catálogo central de agentes
version: 1
updated: 2026-07-03T16:55:00Z

agents:
  - name: mystic
    role: primary-operator
    level: L1
    model: "opencode-go"
    status: active
    description: "AI principal — coordina todo el sistema"
    capabilities: ["*"]

  - name: hermes
    role: gateway
    level: L1
    model: "ollama/qwen3:4b-64k"
    status: active
    description: "Gateway multi-canal (Telegram, WhatsApp, Desktop)"
    capabilities: ["read.infra", "write.docs", "notify.telegram"]

  - name: builder
    role: executor
    level: L2
    model: "ollama/llama3.2:3b-64k"
    status: active
    description: "Ejecuta tareas de implementación"
    capabilities: ["build.docker", "write.code", "read.git", "run.tests"]

  - name: auditor
    role: compliance
    level: L2
    model: "ollama/deepseek-r1:7b-64k"
    status: active
    description: "Audita compliance, truth, y seguridad"
    capabilities: ["read.infra", "read.code", "read.secrets", "audit.compliance"]
    never: ["write.*", "deploy.*", "git.push"]

  - name: reviewer
    role: quality
    level: L1
    model: "ollama/qwen3:4b-64k"
    status: active
    description: "Revisa código y documentación"
    capabilities: ["read.code", "read.docs", "write.reviews"]

  - name: researcher
    role: discovery
    level: L1
    model: "ollama/deepseek-r1:7b-64k"
    status: active
    description: "Investigación y descubrimiento"
    capabilities: ["read.infra", "read.code", "fetch.web"]

  - name: devops
    role: infrastructure
    level: L2
    model: "ollama/qwen3:4b-64k"
    status: active
    description: "Operaciones e infraestructura"
    capabilities: ["read.infra", "docker.*", "systemctl.*", "deploy.staging"]
    never: ["deploy.production"]

  - name: sales
    role: business
    level: L1
    model: "ollama/qwen3:4b-64k"
    status: active
    description: "Pipeline de ventas"
    capabilities: ["read.crm", "write.crm", "notify.email"]

  - name: process-doc
    role: documentation
    level: L1
    model: "ollama/deepseek-r1:7b-64k"
    status: active
    description: "Auto-Doc — genera documentación de proceso"
    capabilities: ["read.code", "write.docs", "read.git"]

  - name: execution
    role: scheduler
    level: L1
    model: "ollama/qwen3:4b-64k"
    status: active
    description: "Execution Kernel — gestiona cola de tareas, prioridad, retry, y ejecucion"
    capabilities: ["execution.queue.*", "execution.execute.*"]

  - name: evolution
    role: self-improvement
    level: L1
    model: "ollama/deepseek-r1:7b-64k"
    status: active
    description: "Self-Evolution Loop — propone, simula, e implementa mejoras del sistema"
    capabilities: ["read.metrics", "read.learned", "write.proposals", "simulate.change"]
