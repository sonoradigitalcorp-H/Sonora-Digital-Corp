agents:
  # ── SDC Core Agents ──
  - name: creator-agent
    tenant: sdc
    role: Build and deploy complete agent-native companies
    tools: [lovable_generate_page, hasura_query, hasura_mutate, upload_file, engram_save, omnivoice_clone]
    memory: engram_sdc
    channel: agent:creator
    triggers: [command:/crear-empresa, command:/agregar-artista]
    emits: [agent:manifest_created, agent:agent_spawned]

  - name: quality-agent
    tenant: sdc
    role: Evaluate and certify prompts and pipelines
    tools: [llm_chat, engram_search, rag_search]
    memory: engram_sdc
    channel: agent:quality
    triggers: [event:system:pipeline:end, cron:sunday:12:00]
    emits: [quality:eval_started, quality:eval_completed, quality:eval_failed]

  - name: monitor-agent
    tenant: sdc
    role: System self-care and auto-repair
    tools: [engram_save, telegram_notify]
    memory: engram_sdc
    channel: agent:monitor
    triggers: [cron:*/5, event:system:alert]
    emits: [system:service:up, system:service:down, system:service:recovered, system:disk:warning]

  # ── ABE Music Agents ──
  - name: ceo-agent
    tenant: abe-music
    role: Business owner — revenue, KPIs, decisions
    tools: [hasura_query, engram_get, rag_search, llm_chat]
    memory: engram_abe_music
    channel: agent:ceo
    triggers: [command:/dashboard, command:/report]
    emits: [crm:report:generated]

  - name: marketing-agent
    tenant: abe-music
    role: Brand strategy, campaigns, trends
    tools: [rag_search, llm_chat, engram_save, firecrawl_crawl]
    memory: engram_abe_music
    channel: agent:marketing
    triggers: [cron:08:00, command:/campaña]
    emits: [marketing:campaign:started, marketing:campaign:completed]

  - name: content-agent
    tenant: abe-music
    role: Daily content factory — videos, reels, podcasts
    tools: [rag_search, llm_chat, generate_video, export_video, tts_generate, whisper_transcribe, engram_save, upload_file]
    memory: engram_abe_music
    channel: agent:content
    triggers: [cron:06:00, command:/generar]
    emits: [content:video:generated, content:video:failed, content:pipeline:completed]

  - name: sales-agent
    tenant: abe-music
    role: Sell products, process payments, upsell
    tools: [stripe_create_checkout, stripe_create_payment, stripe_create_product, supabase_upload_file, upload_file, engram_save]
    memory: engram_abe_music
    channel: agent:sales
    triggers: [event:webhook:stripe, command:/vender]
    emits: [sales:lead:qualified, sales:deal:won, sales:deal:lost, sales:payment:processed]

  - name: support-agent
    tenant: abe-music
    role: Customer service, FAQ, issue resolution
    tools: [rag_search, engram_search, llm_chat, omnivoice_speak]
    memory: engram_abe_music
    channel: agent:support
    triggers: [event:ticket:new, command:/soporte]
    emits: [support:ticket:opened, support:ticket:resolved, support:ticket:escalated]

  - name: voice-agent
    tenant: abe-music
    role: Voice interface for the smart app
    tools: [omnivoice_speak, omnivoice_clone, omnivoice_list_voices, whisper_transcribe, llm_chat, rag_search]
    memory: engram_abe_music
    channel: agent:voice
    triggers: [always:available:in-app]
    emits: [voice:call:started, voice:call:completed]

  - name: clone-agent
    tenant: sdc
    role: Clone publicitario — entrenar LoRA facial + voz, generar contenido con identidad del cliente
    tools: [validate_photos, train_lora, check_face_quality, validate_audio, clone_voice, list_voices, generate_tts, gen_photo, gen_video, gen_tts, ffmpeg_convert, ffmpeg_assemble, ffmpeg_multiformat, create_pack, consume_credit, get_credits]
    memory: engram_sdc
    channel: agent:clone
    triggers: [command:/clonar, event:clone:client_registered, event:clone:photos_collected]
    emits: [clone:client_registered, clone:photos_collected, clone:lora_trained, clone:voice_cloned, clone:generated, clone:credits_low]

  - name: research-agent
    tenant: sdc
    role: Investigación y análisis — capacidades, artistas, scoring, health del sistema
    tools: [capability_resolve, enterprise_score, health_all, engram_search, rag_search]
    memory: engram_sdc
    channel: agent:research
    triggers: [event:research:requested, command:/investigar]
    emits: [research:completed, research:failed]

  - name: video-agent
    tenant: sdc
    role: Generación de video — talking heads, lipsync, video editing
    tools: [gen_video, gen_tts, ffmpeg_convert, ffmpeg_assemble, upload_file]
    memory: engram_sdc
    channel: agent:video
    triggers: [event:content:video_requested, command:/video]
    emits: [content:video:generated, content:video:failed]

  - name: finance-agent
    tenant: sdc
    role: Procesamiento de pagos — Stripe, MercadoPago, facturación, conciliación
    tools: [stripe_create_checkout, stripe_create_payment, mp_create_preference, mp_query_payment, engram_save]
    memory: engram_sdc
    channel: agent:finance
    triggers: [event:payment:process:requested, event:invoice:generated]
    emits: [payment:processed, payment:refunded, payment:failed, payment:reconciled]
