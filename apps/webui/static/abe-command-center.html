<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABE Music · Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Inter',sans-serif; background:#060608; color:#e2e8f0; min-height:100vh; }
.orbitron { font-family:'Playfair Display',serif; }
.container { max-width:1200px; margin:0 auto; padding:24px 20px; }

.header { display:flex; justify-content:space-between; align-items:center; padding:20px 0; border-bottom:1px solid rgba(255,215,0,0.08); margin-bottom:32px; flex-wrap:wrap; gap:12px; }
.header-left { display:flex; align-items:center; gap:16px; }
.brand-icon { width:44px; height:44px; border-radius:12px; background:linear-gradient(135deg,#c8a87c,#a8895e); display:flex; align-items:center; justify-content:center; font-size:20px; font-weight:800; color:#060608; font-family:'Playfair Display',serif; }
.header h1 { font-size:22px; font-weight:700; color:#fff; letter-spacing:-0.02em; }
.header h1 span { color:#c8a87c; }
.header .sub { font-size:12px; color:#666; margin-top:2px; }
.header-right { display:flex; gap:10px; align-items:center; }
.status-dot { width:8px; height:8px; border-radius:50%; display:inline-block; }
.status-dot.online { background:#22c55e; box-shadow:0 0 8px rgba(34,197,94,0.5); }
.badge { background:rgba(200,168,124,0.12); color:#c8a87c; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; }

.kpi-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:16px; margin-bottom:32px; }
@media(max-width:800px){ .kpi-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:500px){ .kpi-grid { grid-template-columns:1fr; } }
.kpi-card { background:linear-gradient(135deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.05); border-radius:14px; padding:20px; position:relative; overflow:hidden; }
.kpi-card::before { content:''; position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#c8a87c,transparent); }
.kpi-label { font-size:11px; color:#666; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; margin-bottom:8px; }
.kpi-value { font-size:32px; font-weight:700; color:#fff; font-family:'Playfair Display',serif; letter-spacing:-0.02em; }
.kpi-value.gold { color:#c8a87c; }
.kpi-change { font-size:11px; color:#22c55e; margin-top:4px; }

.section-title { font-size:16px; font-weight:600; color:#fff; margin-bottom:16px; display:flex; align-items:center; gap:8px; }
.section-title .count { background:rgba(200,168,124,0.12); color:#c8a87c; padding:2px 10px; border-radius:12px; font-size:11px; font-weight:600; }

.artist-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:16px; margin-bottom:32px; }
@media(max-width:900px){ .artist-grid { grid-template-columns:repeat(2,1fr); } }
@media(max-width:550px){ .artist-grid { grid-template-columns:1fr; } }
.artist-card { background:linear-gradient(135deg,rgba(255,255,255,0.02),rgba(255,255,255,0.01)); border:1px solid rgba(255,255,255,0.05); border-radius:14px; overflow:hidden; transition:all 0.3s; }
.artist-card:hover { border-color:rgba(200,168,124,0.2); transform:translateY(-2px); }
.artist-banner { height:120px; background:linear-gradient(135deg,#1a1410,#2a2018); display:flex; align-items:center; justify-content:center; position:relative; }
.artist-avatar { width:56px; height:56px; border-radius:50%; background:linear-gradient(135deg,#c8a87c,#8a6d44); display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:700; color:#060608; font-family:'Playfair Display',serif; border:3px solid rgba(200,168,124,0.3); }
.artist-rank { position:absolute; top:10px; right:10px; background:rgba(200,168,124,0.15); color:#c8a87c; padding:2px 10px; border-radius:12px; font-size:10px; font-weight:700; }
.artist-body { padding:16px; }
.artist-body h3 { font-family:'Playfair Display',serif; font-size:17px; color:#fff; margin-bottom:2px; }
.artist-body .genre { font-size:10px; color:#c8a87c; text-transform:uppercase; letter-spacing:0.08em; font-weight:600; }
.artist-stats { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-top:12px; padding-top:12px; border-top:1px solid rgba(255,255,255,0.04); }
.artist-stat { }
.artist-stat .label { font-size:10px; color:#555; text-transform:uppercase; letter-spacing:0.05em; }
.artist-stat .value { font-size:15px; font-weight:600; color:#e2e8f0; margin-top:2px; }
.artist-stat .value.gold { color:#c8a87c; }
.artist-body .btn { display:inline-block; margin-top:12px; padding:6px 16px; border-radius:8px; background:rgba(200,168,124,0.1); color:#c8a87c; text-decoration:none; font-size:11px; font-weight:600; transition:all 0.3s; }
.artist-body .btn:hover { background:rgba(200,168,124,0.2); }

.report-section { background:linear-gradient(135deg,rgba(255,255,255,0.015),rgba(255,255,255,0.005)); border:1px solid rgba(255,255,255,0.04); border-radius:14px; padding:24px; margin-bottom:32px; }
.report-grid { display:grid; grid-template-columns:1fr 1fr; gap:24px; }
@media(max-width:700px){ .report-grid { grid-template-columns:1fr; } }
.report-col h4 { font-size:13px; color:#888; text-transform:uppercase; letter-spacing:0.06em; font-weight:600; margin-bottom:12px; }
.report-row { display:flex; justify-content:space-between; padding:8px 0; border-bottom:1px solid rgba(255,255,255,0.03); font-size:13px; }
.report-row:last-child { border-bottom:none; }
.report-row .lbl { color:#888; }
.report-row .val { color:#e2e8f0; font-weight:500; }
.report-row .val.gold { color:#c8a87c; }

.footer { text-align:center; padding:24px; border-top:1px solid rgba(255,255,255,0.03); color:#444; font-size:11px; }
.footer a { color:#c8a87c; text-decoration:none; }

.loading { text-align:center; padding:80px 20px; color:#666; }
.loading .spinner { width:32px; height:32px; border:3px solid rgba(200,168,124,0.1); border-top-color:#c8a87c; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 16px; }
@keyframes spin { to { transform:rotate(360deg); } }

.error-state { text-align:center; padding:60px 20px; }
.error-state .emoji { font-size:40px; margin-bottom:12px; }
.error-state p { color:#888; }

.telegram-bar { display:flex; align-items:center; gap:12px; background:rgba(0,136,204,0.06); border:1px solid rgba(0,136,204,0.1); border-radius:10px; padding:12px 16px; margin-bottom:24px; }
.telegram-bar .icon { font-size:20px; }
.telegram-bar .info { flex:1; }
.telegram-bar .info strong { color:#e2e8f0; font-size:13px; }
.telegram-bar .info span { color:#666; font-size:11px; display:block; }
.telegram-bar .tag { background:rgba(0,136,204,0.12); color:#08c; padding:4px 12px; border-radius:20px; font-size:11px; font-weight:600; white-space:nowrap; }
</style>
</head>
<body>
<div class="container" id="app">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>Cargando ABE Music Command Center...</p>
  </div>
  <div id="error-state" class="error-state" style="display:none">
    <div class="emoji">⚠️</div>
    <p>No se pudo conectar con el servidor. Verifica que JARVIS Web UI esté corriendo en el puerto 5174.</p>
  </div>
  <div id="content" style="display:none"></div>
  <div class="footer">
    <p>ABE Music Inc · Powered by <a href="http://localhost:5174" target="_blank">JARVIS AI Agency</a> · Sonora Digital Corp</p>
    <p style="margin-top:4px">Live data · Actualizado en tiempo real</p>
  </div>
</div>

<script>
async function loadData() {
  try {
    const [ceoResp, artistsResp] = await Promise.all([
      fetch('/api/abe/dashboard/ceo').catch(() => fetch('http://localhost:5174/api/abe/dashboard/ceo')),
      fetch('/api/abe/artists').catch(() => fetch('http://localhost:5174/api/abe/artists'))
    ]);
    if (!ceoResp.ok) throw new Error('API not available');
    const ceo = await ceoResp.json();
    const artists = artistsResp.ok ? (await artistsResp.json()).artists : [];

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    const container = document.getElementById('content');
    container.innerHTML = `
      <div class="header">
        <div class="header-left">
          <div class="brand-icon">A</div>
          <div>
            <h1>ABE <span>Music</span></h1>
            <div class="sub">Command Center · Ejecutivo</div>
          </div>
        </div>
        <div class="header-right">
          <span class="badge">${ceo.active_artists} activos</span>
          <span class="badge" style="background:rgba(34,197,94,0.1);color:#22c55e"><span class="status-dot online"></span> Live</span>
        </div>
      </div>

      <div class="telegram-bar">
        <div class="icon">🤖</div>
        <div class="info">
          <strong>@Gucci_ortega_bot</strong>
          <span>Bot de Telegram activo — Escribe /start para recibir KPIs</span>
        </div>
        <div class="tag">${formatTime()}</div>
      </div>

      <div class="kpi-grid">
        <div class="kpi-card">
          <div class="kpi-label">Artistas</div>
          <div class="kpi-value">${ceo.total_artists}</div>
          <div class="kpi-change">${ceo.active_artists} activos · ${ceo.signed_artists} firmados</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Streams Totales</div>
          <div class="kpi-value gold">${formatNum(ceo.total_streams)}</div>
          <div class="kpi-change">+${formatNum(Math.round(ceo.total_streams * 0.03))} esta semana</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Revenue Total</div>
          <div class="kpi-value gold">$${formatNum(ceo.total_revenue)}</div>
          <div class="kpi-change">$${formatNum(Math.round(ceo.total_revenue * 0.05))} este mes</div>
        </div>
        <div class="kpi-card">
          <div class="kpi-label">Releases</div>
          <div class="kpi-value">${ceo.total_releases}</div>
          <div class="kpi-change">${ceo.total_releases - 4} nuevos en 2026</div>
        </div>
      </div>

      <div class="section-title">
        📀 Artistas <span class="count">${artists.length}</span>
      </div>
      <div class="artist-grid" id="artist-grid">
        ${artists.map((a, i) => `
          <div class="artist-card">
            <div class="artist-banner">
              <div class="artist-avatar">${a.nombre.charAt(0)}</div>
              <div class="artist-rank">#${i + 1}</div>
            </div>
            <div class="artist-body">
              <h3>${a.nombre}</h3>
              <div class="genre">${a.genero || 'Sin género'}</div>
              <div class="artist-stats">
                <div class="artist-stat">
                  <div class="label">Streams</div>
                  <div class="value">${formatNum(a.streams)}</div>
                </div>
                <div class="artist-stat">
                  <div class="label">Revenue</div>
                  <div class="value gold">$${formatNum(a.revenue)}</div>
                </div>
              </div>
              <a class="btn" href="${getArtistUrl(a.nombre)}" target="_blank">Ver perfil →</a>
            </div>
          </div>
        `).join('')}
        ${artists.length === 0 ? '<p style="color:#666;grid-column:1/-1;text-align:center;padding:40px">No hay artistas registrados</p>' : ''}
      </div>

      <div class="section-title">📊 Distribución de Revenue</div>
      <div class="report-section">
        <div class="report-grid">
          <div class="report-col">
            <h4>Por Artista</h4>
            ${ceo.top_artists.map((a, i) => {
              const pct = ceo.total_revenue > 0 ? (a.revenue / ceo.total_revenue * 100).toFixed(0) : 0;
              return `
                <div class="report-row">
                  <span class="lbl">${i+1}. ${a.nombre}</span>
                  <span class="val gold">${pct}% · $${formatNum(a.revenue)}</span>
                </div>
              `;
            }).join('')}
          </div>
          <div class="report-col">
            <h4>Royalty Split (Streaming)</h4>
            <div class="report-row"><span class="lbl">Artista (70%)</span><span class="val gold">$${formatNum(Math.round(ceo.revenue_breakdown.artists_share))}</span></div>
            <div class="report-row"><span class="lbl">Sello (20%)</span><span class="val">$${formatNum(Math.round(ceo.revenue_breakdown.label_share))}</span></div>
            <div class="report-row"><span class="lbl">Distribución (10%)</span><span class="val">$${formatNum(Math.round(ceo.total_revenue * 0.1))}</span></div>
            <div class="report-row" style="border-top:1px solid rgba(200,168,124,0.15);margin-top:4px;padding-top:10px">
              <span class="lbl" style="font-weight:600;color:#e2e8f0">Total</span>
              <span class="val gold" style="font-weight:700">$${formatNum(ceo.total_revenue)}</span>
            </div>
          </div>
        </div>
      </div>

      <div class="section-title">🌐 Presencia Digital</div>
      <div class="report-section" style="padding:16px 20px">
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px">
          <a href="https://sonoradigitalcorp-h.github.io/productos-hector-rubio/" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;text-decoration:none;color:#e2e8f0;font-size:13px;transition:all 0.2s;" onmouseover="this.style.background='rgba(200,168,124,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">
            <span>🎤</span> Hector Rubio <span style="margin-left:auto;font-size:10px;color:#22c55e">✓</span>
          </a>
          <a href="https://sonoradigitalcorp-h.github.io/productos-jesus-urquijo/" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;text-decoration:none;color:#e2e8f0;font-size:13px;transition:all 0.2s;" onmouseover="this.style.background='rgba(200,168,124,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">
            <span>🎤</span> Jesus Urquijo <span style="margin-left:auto;font-size:10px;color:#22c55e">✓</span>
          </a>
          <a href="https://sonoradigitalcorp-h.github.io/productos-javier-arvayo/" target="_blank" style="display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(255,255,255,0.02);border-radius:8px;text-decoration:none;color:#e2e8f0;font-size:13px;transition:all 0.2s;" onmouseover="this.style.background='rgba(200,168,124,0.08)'" onmouseout="this.style.background='rgba(255,255,255,0.02)'">
            <span>🎤</span> Javier Arvayo <span style="margin-left:auto;font-size:10px;color:#22c55e">✓</span>
          </a>
        </div>
      </div>
    `;
  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error-state').style.display = 'block';
  }
}

function formatNum(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return (n/1000).toFixed(1) + 'K';
  return n.toLocaleString();
}

function formatTime() {
  return new Date().toLocaleString('es-MX', { hour:'2-digit', minute:'2-digit', day:'2-digit', month:'short' });
}

function getArtistUrl(name) {
  const map = {
    'hector rubio': 'https://sonoradigitalcorp-h.github.io/productos-hector-rubio/',
    'jesus urquijo': 'https://sonoradigitalcorp-h.github.io/productos-jesus-urquijo/',
    'javier arvayo': 'https://sonoradigitalcorp-h.github.io/productos-javier-arvayo/'
  };
  return map[name.toLowerCase()] || '#';
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
