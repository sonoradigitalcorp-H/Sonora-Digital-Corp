<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS Command Center</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
:root {
  --bg: #0a0a14;
  --surface: rgba(255,255,255,0.03);
  --border: rgba(255,255,255,0.08);
  --text: #c0c0d0;
  --text-dim: #606070;
  --accent: #00d4ff;
  --accent2: #7b2ff7;
  --success: #4ade80;
  --warn: #fbbf24;
  --error: #ff4757;
  --font: 'Segoe UI', system-ui, -apple-system, sans-serif;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
  overflow: hidden;
  height: 100vh;
  width: 100vw;
}
#app {
  display: grid;
  grid-template-columns: 1fr 380px;
  grid-template-rows: 48px 1fr 32px;
  height: 100vh;
  gap: 1px;
  background: var(--border);
}
#topbar {
  grid-column: 1 / -1;
  background: var(--bg);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  border-bottom: 1px solid var(--border);
}
#topbar h1 {
  font-size: 14px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
#topbar .badge {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
}
#topbar .badge.online { color: var(--success); border-color: var(--success); }
#topbar .spacer { flex: 1; }
#topbar .clock { font-size: 12px; color: var(--text-dim); font-variant-numeric: tabular-nums; }
#graph-panel {
  background: var(--bg);
  position: relative;
  overflow: hidden;
}
#graph-panel svg {
  width: 100%;
  height: 100%;
}
#activity-panel {
  background: var(--bg);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
#activity-header {
  padding: 12px 16px 8px;
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: var(--text-dim);
  border-bottom: 1px solid var(--border);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
#activity-header .count { font-size: 10px; color: var(--accent); }
#activity-feed {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}
#activity-feed::-webkit-scrollbar { width: 3px; }
#activity-feed::-webkit-scrollbar-track { background: transparent; }
#activity-feed::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.activity-item {
  display: flex;
  gap: 10px;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 4px;
  font-size: 12px;
  line-height: 1.4;
  animation: slideIn 0.2s ease-out;
  background: var(--surface);
  border-left: 3px solid var(--border);
}
.activity-item.agent-route { border-left-color: var(--accent); }
.activity-item.tool-calls { border-left-color: var(--accent2); }
.activity-item.tool-result { border-left-color: var(--success); }
.activity-item.connected { border-left-color: var(--success); opacity: 0.6; }
.activity-item .icon { font-size: 14px; flex-shrink: 0; width: 18px; text-align: center; }
.activity-item .body { flex: 1; min-width: 0; }
.activity-item .body .agent { color: var(--accent); font-weight: 600; }
.activity-item .body .tool { color: var(--accent2); font-weight: 600; }
.activity-item .body .status { font-size: 11px; color: var(--text-dim); }
.activity-item .time { font-size: 10px; color: var(--text-dim); flex-shrink: 0; }
#statusbar {
  grid-column: 1 / -1;
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 20px;
  font-size: 11px;
  color: var(--text-dim);
}
#statusbar .dot {
  width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 4px;
}
#statusbar .dot.green { background: var(--success); }
#statusbar .dot.yellow { background: var(--warn); }
#statusbar .dot.red { background: var(--error); }
#statusbar .stat { display: flex; align-items: center; gap: 4px; }
@keyframes slideIn {
  from { opacity: 0; transform: translateX(-8px); }
  to { opacity: 1; transform: translateX(0); }
}
.node-label { pointer-events: none; font-size: 9px; fill: #888; text-anchor: middle; }
.node-circle { stroke: rgba(255,255,255,0.2); stroke-width: 1px; cursor: pointer; transition: r 0.15s; }
.node.active .node-circle { stroke-width: 2px; filter: drop-shadow(0 0 6px currentColor); }
.link-line { stroke-opacity: 0.25; }
#graph-legend {
  position: absolute;
  bottom: 16px;
  left: 16px;
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  font-size: 10px;
  color: var(--text-dim);
}
#graph-legend .item { display: flex; align-items: center; gap: 4px; }
#graph-legend .swatch { width: 8px; height: 8px; border-radius: 50%; }
</style>
</head>
<body>
<div id="app">
  <div id="topbar">
    <h1>JARVIS COMMAND CENTER</h1>
    <span class="badge online">● LIVE</span>
    <span class="badge" id="node-count">37 nodos</span>
    <span class="spacer"></span>
    <span class="clock" id="clock"></span>
  </div>
  <div id="graph-panel">
    <svg id="graph"></svg>
    <div id="graph-legend"></div>
  </div>
  <div id="activity-panel">
    <div id="activity-header">
      <span>Actividad en vivo</span>
      <span class="count" id="activity-count">0</span>
    </div>
    <div id="activity-feed"></div>
  </div>
  <div id="statusbar">
    <span class="stat"><span class="dot green"></span> Sistema operativo</span>
    <span class="stat" id="stat-agents">Agentes: 15</span>
    <span class="stat" id="stat-services">Servicios: 6/6</span>
    <span class="stat" id="stat-sse">SSE: conectado</span>
  </div>
</div>

<script>
const COLORS = {
  jarvis: "#00d4ff", hermes: "#7b2ff7", openclaw: "#ff6b35",
  mcp: "#ffd700", infra: "#4ade80", user: "#ff4757", external: "#888"
};
const GROUP_NAMES = {
  jarvis: "JARVIS Core", hermes: "Hermes", openclaw: "OpenClaw",
  mcp: "MCP", infra: "Infra", user: "Usuario", external: "Externo"
};
const ACTIVITY_ICONS = {
  agent_route: "→", tool_calls: "⚡", tool_result: "✓", connected: "●"
};

// --- Clock ---
function updateClock() {
  const now = new Date();
  document.getElementById('clock').textContent = now.toLocaleTimeString('es-MX', { hour12: false });
}
setInterval(updateClock, 1000);
updateClock();

// --- Graph ---
let nodeMap = {};

fetch('/api/brain/graph')
  .then(r => r.json())
  .then(data => {
    const width = document.getElementById('graph-panel').clientWidth;
    const height = document.getElementById('graph-panel').clientHeight;

    data.nodes.forEach(n => { nodeMap[n.id] = n; });

    const svg = d3.select('#graph');
    const g = svg.append('g');
    const zoom = d3.zoom().scaleExtent([0.1, 4]).on('zoom', (e) => g.attr('transform', e.transform));
    svg.call(zoom).call(zoom.transform, d3.zoomIdentity.translate(width * 0.35, height * 0.5).scale(0.65));

    const linkGroup = g.append('g');
    const nodeGroup = g.append('g');

    const simulation = d3.forceSimulation(data.nodes)
      .force('link', d3.forceLink(data.links).id(d => d.id).distance(100).strength(0.4))
      .force('charge', d3.forceManyBody().strength(-250))
      .force('center', d3.forceCenter(0, 0))
      .force('collision', d3.forceCollide(20));

    const link = linkGroup.selectAll('line')
      .data(data.links).join('line')
      .attr('class', 'link-line')
      .attr('stroke', l => COLORS[l.type] || '#555')
      .attr('stroke-width', 0.6);

    const node = nodeGroup.selectAll('g.node')
      .data(data.nodes).join('g')
      .attr('class', d => `node group-${d.group}`)
      .call(d3.drag()
        .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; }));

    const radius = d => {
      if (d.group === 'user') return 16;
      if (d.type === 'orchestrator') return 12;
      if (d.type === 'agent') return 8;
      return 7;
    };

    node.append('circle')
      .attr('class', 'node-circle')
      .attr('r', radius)
      .attr('fill', d => COLORS[d.group] || '#666')
      .on('mouseover', function(e, d) {
        node.classed('active', n => n.id === d.id || data.links.some(l =>
          (l.source.id||l.source) === d.id && (l.target.id||l.target) === n.id) ||
          data.links.some(l => (l.target.id||l.target) === d.id && (l.source.id||l.source) === n.id));
        link.classed('link-line', true).style('stroke-opacity', l =>
          (l.source.id||l.source) === d.id || (l.target.id||l.target) === d.id ? 0.8 : 0.1);
      })
      .on('mouseout', function() {
        node.classed('active', false);
        link.style('stroke-opacity', 0.25);
      });

    node.append('text')
      .attr('class', 'node-label')
      .text(d => d.label.length > 18 ? d.label.slice(0, 16) + '…' : d.label)
      .attr('dy', d => radius(d) + 10);

    // Legend
    const legend = document.getElementById('graph-legend');
    Object.entries(GROUP_NAMES).forEach(([key, name]) => {
      const item = document.createElement('span');
      item.className = 'item';
      item.innerHTML = `<span class="swatch" style="background:${COLORS[key]}"></span>${name}`;
      legend.appendChild(item);
    });

    // Stats
    document.getElementById('node-count').textContent = `${data.nodes.length} nodos · ${data.links.length} conexiones`;

    simulation.on('tick', () => {
      link.attr('x1', l => l.source.x).attr('y1', l => l.source.y)
          .attr('x2', l => l.target.x).attr('y2', l => l.target.y);
      node.attr('transform', d => `translate(${d.x},${d.y})`);
    });
  });

// --- Activity Feed ---
const feed = document.getElementById('activity-feed');
let activityCount = 0;

function formatTime(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
}

function addActivity(event) {
  const { type, data, timestamp } = event;
  if (!type) return;

  const item = document.createElement('div');
  item.className = `activity-item ${type}`;

  const icon = document.createElement('span');
  icon.className = 'icon';
  icon.textContent = ACTIVITY_ICONS[type] || '•';

  const body = document.createElement('div');
  body.className = 'body';

  const time = document.createElement('span');
  time.className = 'time';
  time.textContent = formatTime(timestamp);

  switch (type) {
    case 'agent_route':
      body.innerHTML = `<span class="agent">→ ${data.agent}</span><div class="status">${data.message || ''}</div>`;
      break;
    case 'tool_calls':
      body.innerHTML = `<span class="tool">⚡ ${data.tools.join(', ')}</span><div class="status">Agente: ${data.agent}</div>`;
      break;
    case 'tool_result':
      const st = data.status === 'success' || data.status === 'ok' ? '✅' : data.status === 'error' ? '❌' : data.status;
      body.innerHTML = `<span class="tool">${data.tool}</span> <span style="color:${data.status === 'success' || data.status === 'ok' ? 'var(--success)' : 'var(--error)'}">${st}</span>`;
      break;
    case 'connected':
      body.innerHTML = `Conectado al stream de actividad`;
      break;
    default:
      body.textContent = `${type}: ${JSON.stringify(data).slice(0, 80)}`;
  }

  item.appendChild(icon);
  item.appendChild(body);
  item.appendChild(time);
  feed.appendChild(item);
  feed.scrollTop = feed.scrollHeight;

  activityCount++;
  document.getElementById('activity-count').textContent = activityCount;

  // Keep max 200 items
  while (feed.children.length > 200) {
    feed.removeChild(feed.firstChild);
  }
}

// --- SSE ---
const evtSource = new EventSource('/api/brain/stream');
evtSource.onmessage = function(e) {
  try {
    const event = JSON.parse(e.data);
    addActivity(event);
    // Update SSE status
    document.getElementById('stat-sse').innerHTML = 'SSE: <span style="color:var(--success)">conectado</span>';
  } catch (err) {
    // keepalive or parse error
  }
};
evtSource.onerror = function() {
  document.getElementById('stat-sse').innerHTML = 'SSE: <span style="color:var(--error)">desconectado</span>';
};

// --- Window resize ---
window.addEventListener('resize', () => {
  const svg = document.getElementById('graph');
  const panel = document.getElementById('graph-panel');
  svg.setAttribute('width', panel.clientWidth);
  svg.setAttribute('height', panel.clientHeight);
});
</script>
</body>
</html>
