<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABE MUSIC — Dashboard CEO</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f0f23;color:#f0f0f0;font-family:'Inter',system-ui,sans-serif;min-height:100vh}
.bg-glow{position:fixed;top:0;left:0;width:100%;height:100%;background:radial-gradient(ellipse at 30% 20%,rgba(255,215,0,0.06),transparent 60%),radial-gradient(ellipse at 70% 80%,rgba(233,69,96,0.04),transparent 60%);pointer-events:none;z-index:0}
header{position:relative;z-index:1;padding:32px 24px 20px;border-bottom:1px solid rgba(255,215,0,0.1)}
header h1{font-size:1.8rem;font-weight:800;background:linear-gradient(135deg,#FFD700,#e94560);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
header .sub{color:rgba(255,255,255,0.4);font-size:0.85rem;margin-top:4px;letter-spacing:3px;text-transform:uppercase}
.container{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:32px 24px}
.loading{display:flex;justify-content:center;align-items:center;min-height:60vh;flex-direction:column;gap:20px}
.loading .spinner{width:48px;height:48px;border:3px solid rgba(255,215,0,0.1);border-top-color:#FFD700;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading p{color:rgba(255,255,255,0.5)}
.error{display:none;text-align:center;padding:60px 20px}
.error .icon{font-size:3rem;margin-bottom:16px}
.error h2{color:#e94560;margin-bottom:8px}
.error p{color:rgba(255,255,255,0.5);font-size:0.9rem}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:40px}
.metric{background:rgba(255,215,0,0.04);border:1px solid rgba(255,215,0,0.12);border-radius:16px;padding:24px;position:relative;overflow:hidden;transition:all 0.3s}
.metric:hover{border-color:rgba(255,215,0,0.3);transform:translateY(-2px)}
.metric .label{font-size:0.75rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:8px}
.metric .value{font-size:2rem;font-weight:800;color:#FFD700;line-height:1.2}
.metric .value.gold{color:#FFD700}
.metric .value.muted{color:rgba(255,255,255,0.6);font-size:1.4rem}
.metric .sub{font-size:0.75rem;color:rgba(255,255,255,0.3);margin-top:4px}
.metric .bar{position:absolute;bottom:0;left:0;height:3px;background:linear-gradient(90deg,#FFD700,#e94560);transition:width 1s ease}
.row{display:grid;grid-template-columns:1fr 1fr;gap:24px;margin-bottom:40px}
@media(max-width:768px){.row{grid-template-columns:1fr}}
.card{background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:16px;padding:28px;transition:all 0.3s}
.card:hover{border-color:rgba(255,215,0,0.15)}
.card h3{font-size:0.8rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.4);margin-bottom:20px;padding-bottom:12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.artist-item{display:flex;justify-content:space-between;align-items:center;padding:14px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.artist-item:last-child{border-bottom:none}
.artist-item .name{font-weight:600;font-size:0.95rem}
.artist-item .name .rank{color:rgba(255,255,255,0.3);margin-right:8px;font-size:0.8rem}
.artist-item .stats{text-align:right}
.artist-item .stats .num{font-weight:700;color:#FFD700;font-size:0.95rem}
.artist-item .stats .label{font-size:0.7rem;color:rgba(255,255,255,0.3);margin-left:4px}
.split-visual{display:flex;height:12px;border-radius:6px;overflow:hidden;margin:16px 0}
.split-segment{transition:all 0.5s}
.split-legend{display:flex;gap:24px;flex-wrap:wrap;margin-top:12px}
.split-legend .legend-item{font-size:0.8rem;color:rgba(255,255,255,0.5);display:flex;align-items:center;gap:8px}
.split-legend .dot{width:10px;height:10px;border-radius:50%;display:inline-block}
.split-detail{margin-top:16px}
.split-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.9rem}
.split-row:last-child{border-bottom:none}
.split-row .pct{color:#FFD700;font-weight:600}
.release-item{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.release-item:last-child{border-bottom:none}
.release-item .title{font-weight:500;font-size:0.9rem}
.release-item .meta{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-top:2px}
.release-item .streams{font-weight:600;color:#FFD700;font-size:0.9rem}
.status-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:0.7rem;font-weight:600;letter-spacing:0.5px}
.status-active{background:rgba(0,255,100,0.12);color:#00cc50}
.status-signed{background:rgba(255,215,0,0.12);color:#FFD700}
.refresh-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding:12px 16px;background:rgba(255,255,255,0.02);border-radius:12px;border:1px solid rgba(255,255,255,0.04)}
.refresh-bar .time{font-size:0.8rem;color:rgba(255,255,255,0.3)}
.refresh-btn{padding:6px 16px;border-radius:8px;border:1px solid rgba(255,215,0,0.2);background:transparent;color:#FFD700;font-size:0.8rem;cursor:pointer;transition:all 0.3s}
.refresh-btn:hover{background:rgba(255,215,0,0.1)}
.refresh-btn:disabled{opacity:0.4;cursor:not-allowed}
</style>
</head>
<body>
<div class="bg-glow"></div>

<header>
  <h1>ABE MUSIC</h1>
  <div class="sub">Dashboard CEO · Tiempo Real</div>
</header>

<div class="container">
  <div id="loading" class="loading">
    <div class="spinner"></div>
    <p>Cargando datos de ABE MUSIC...</p>
  </div>

  <div id="error" class="error">
    <div class="icon">⚠️</div>
    <h2>Error de conexión</h2>
    <p>No se pudo conectar con el servidor. Verifica que el servicio esté activo.</p>
  </div>

  <div id="dashboard" style="display:none">
    <div class="refresh-bar">
      <span class="time" id="lastUpdated">Última actualización: —</span>
      <button class="refresh-btn" id="refreshBtn" onclick="loadData()">⟳ Actualizar</button>
    </div>

    <div class="metrics" id="metrics"></div>

    <div class="row">
      <div class="card" id="topArtists">
        <h3>🏆 Top Artistas</h3>
        <div id="artistsList"></div>
      </div>
      <div class="card" id="revenueCard">
        <h3>💰 Revenue Split</h3>
        <div id="revenueContent"></div>
      </div>
    </div>

    <div class="card" id="releasesCard">
      <h3>📀 Últimos Lanzamientos</h3>
      <div id="releasesList"></div>
    </div>
  </div>
</div>

<script>
const API = '/api/abe/dashboard/ceo';
const ARTISTS_API = '/api/abe/artists';

async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.disabled = true;
  btn.textContent = '⟳ Cargando...';

  try {
    const [ceo, artists] = await Promise.all([
      fetch(API).then(r => r.json()),
      fetch(ARTISTS_API).then(r => r.json())
    ]);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'none';
    document.getElementById('dashboard').style.display = 'block';

    renderMetrics(ceo);
    renderArtists(ceo);
    renderRevenue(ceo);
    renderReleases(ceo, artists);

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      'Última actualización: ' + now.toLocaleString('es-MX');
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('dashboard').style.display = 'none';
    document.getElementById('error').style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = '⟳ Actualizar';
  }
}

function renderMetrics(ceo) {
  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="label">Streams Totales</div>
      <div class="value gold">${(ceo.total_streams / 1000).toFixed(0)}K</div>
      <div class="sub">${ceo.total_streams.toLocaleString('es-MX')} reproducciones</div>
    </div>
    <div class="metric">
      <div class="label">Revenue Total</div>
      <div class="value gold">$${ceo.total_revenue.toLocaleString('es-MX')}</div>
      <div class="sub">$${(ceo.revenue_breakdown.label_share).toLocaleString('es-MX')} label share</div>
    </div>
    <div class="metric">
      <div class="label">Artistas</div>
      <div class="value gold">${ceo.total_artists}</div>
      <div class="sub">${ceo.active_artists} activos · ${ceo.signed_artists} firmados</div>
    </div>
    <div class="metric">
      <div class="label">Lanzamientos</div>
      <div class="value gold">${ceo.total_releases}</div>
      <div class="sub">En todas las plataformas</div>
    </div>
  `;
}

function renderArtists(ceo) {
  const top = ceo.top_artists || [];
  document.getElementById('artistsList').innerHTML = top.map((a, i) => `
    <div class="artist-item">
      <div class="name"><span class="rank">#${i + 1}</span>${a.nombre}</div>
      <div class="stats">
        <div class="num">${(a.streams / 1000).toFixed(0)}K <span class="label">streams</span></div>
        <div style="font-size:0.75rem;color:rgba(255,255,255,0.4)">$${a.revenue.toLocaleString('es-MX')}</div>
      </div>
    </div>
  `).join('');
}

function renderRevenue(ceo) {
  const rb = ceo.revenue_breakdown;
  const total = ceo.total_revenue;
  const artistPct = total > 0 ? ((rb.artists_share / total) * 100) : 0;
  const labelPct = total > 0 ? ((rb.label_share / total) * 100) : 0;

  document.getElementById('revenueContent').innerHTML = `
    <div class="split-visual">
      <div class="split-segment" style="flex:${artistPct};background:linear-gradient(90deg,#FFD700,#e6c200)"></div>
      <div class="split-segment" style="flex:${labelPct};background:linear-gradient(90deg,#e94560,#c73a50)"></div>
    </div>
    <div class="split-legend">
      <div class="legend-item"><span class="dot" style="background:#FFD700"></span>Artistas (${artistPct.toFixed(0)}%)</div>
      <div class="legend-item"><span class="dot" style="background:#e94560"></span>Label (${labelPct.toFixed(0)}%)</div>
    </div>
    <div class="split-detail">
      <div class="split-row">
        <span>Artistas Share</span>
        <span>$${rb.artists_share.toLocaleString('es-MX')} <span class="pct">${artistPct.toFixed(0)}%</span></span>
      </div>
      <div class="split-row">
        <span>Label Share</span>
        <span>$${rb.label_share.toLocaleString('es-MX')} <span class="pct">${labelPct.toFixed(0)}%</span></span>
      </div>
    </div>
  `;
}

function renderReleases(ceo, artistsData) {
  const releases = [];
  if (artistsData && artistsData.artists) {
    artistsData.artists.forEach(a => {
      for (let i = 0; i < (a.releases_count || 0); i++) {
        releases.push({
          artist: a.nombre,
          title: `${a.nombre} — Release ${i + 1}`,
          streams: Math.round(a.streams / (a.releases_count || 1))
        });
      }
    });
  }

  if (releases.length === 0) {
    document.getElementById('releasesList').innerHTML = '<p style="color:rgba(255,255,255,0.4)">No hay lanzamientos registrados.</p>';
    return;
  }

  document.getElementById('releasesList').innerHTML = releases.map(r => `
    <div class="release-item">
      <div>
        <div class="title">${r.title}</div>
        <div class="meta">${r.artist}</div>
      </div>
      <div class="streams">${(r.streams / 1000).toFixed(1)}K</div>
    </div>
  `).join('');
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
