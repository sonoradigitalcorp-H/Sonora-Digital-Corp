<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Mystic · SDC</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🔮</text></svg>">
<link rel="manifest" href="/static/manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Mystic">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
:root{--bg:#07070d;--surface:rgba(18,18,26,0.8);--surface-hover:rgba(26,26,46,0.9);--border:rgba(42,45,74,0.4);--primary:#6c5ce7;--primary-glow:rgba(108,92,231,0.15);--accent:#ff6b9d;--accent-glow:rgba(255,107,157,0.1);--text:#e8e8f0;--text-dim:#7a7a9a;--text-muted:#5a5a7a;--radius:16px;--radius-sm:10px;--font:'Inter',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:var(--font);display:flex;flex-direction:column;background-image:radial-gradient(ellipse 80% 60% at 50% -20%,rgba(108,92,231,0.08) 0%,transparent 70%),radial-gradient(ellipse 60% 50% at 80% 100%,rgba(255,107,157,0.05) 0%,transparent 60%)}
#particles{position:fixed;inset:0;pointer-events:none;z-index:0}
header{position:relative;z-index:10;padding:16px 20px 8px;display:flex;align-items:center;justify-content:space-between}
header .brand{display:flex;align-items:center;gap:8px;font-weight:700;font-size:16px;color:var(--text)}
header .brand span{color:var(--accent)}
header .brand small{font-weight:400;font-size:11px;color:var(--text-muted)}
.header-actions{display:flex;gap:6px;align-items:center}
.btn-icon{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
.btn-icon:hover{background:var(--surface-hover);color:var(--text);border-color:var(--primary)}
.btn-icon.speaking{background:var(--accent);color:white;border-color:var(--accent);animation:pulse-mic 1.5s ease infinite}
@keyframes pulse-mic{0%,100%{box-shadow:0 0 0 0 var(--accent-glow)}50%{box-shadow:0 0 20px 4px var(--accent-glow)}}
main{flex:1;display:flex;flex-direction:column;position:relative;z-index:1;padding:0 16px 12px;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:8px 4px 8px 0;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:3px}
#messages::-webkit-scrollbar-track{background:transparent}
#messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
.welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;text-align:center;padding:20px;animation:fadeIn 0.8s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome .avatar{width:80px;height:80px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:36px;margin-bottom:16px;box-shadow:0 0 40px rgba(108,92,231,0.2)}
.welcome h1{font-size:22px;font-weight:700;margin-bottom:6px}
.welcome p{color:var(--text-dim);font-size:14px;max-width:320px}
.welcome .hint{margin-top:24px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:6px;padding:8px 16px;background:var(--surface);border-radius:100px;border:1px solid var(--border)}
.msg{margin-bottom:12px;display:flex;gap:10px;animation:fadeIn 0.3s ease}
.msg.user{flex-direction:row-reverse}
.msg .bubble{max-width:80%;padding:12px 16px;border-radius:14px;font-size:14px;line-height:1.5}
.msg.mystic .bubble{background:var(--surface);border:1px solid var(--border);border-bottom-left-radius:4px}
.msg.user .bubble{background:var(--primary);color:white;border-bottom-right-radius:4px}
.msg .bubble .time{font-size:10px;color:var(--text-muted);margin-top:6px;display:block}
.msg.user .bubble .time{color:rgba(255,255,255,0.5);text-align:right}
.msg.mystic .avatar-sm{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--accent));display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;margin-top:4px}
.typing{display:flex;gap:4px;padding:16px}.typing span{width:6px;height:6px;border-radius:50%;background:var(--text-dim);animation:typing 1.4s ease infinite}.typing span:nth-child(2){animation-delay:0.2s}.typing span:nth-child(3){animation-delay:0.4s}
@keyframes typing{0%,100%{opacity:0.3}50%{opacity:1}}
.input-area{position:relative;z-index:10;padding:8px 0 4px;display:flex;gap:8px;align-items:flex-end}
.input-area textarea{flex:1;resize:none;padding:12px 16px;border-radius:14px;background:var(--surface);border:1px solid var(--border);color:var(--text);font-family:var(--font);font-size:14px;outline:none;min-height:44px;max-height:120px;line-height:1.4;transition:border-color 0.2s}
.input-area textarea:focus{border-color:var(--primary)}
.input-area textarea::placeholder{color:var(--text-muted)}
#volume-meter{position:absolute;bottom:64px;left:10%;width:80%;height:4px;background:var(--border);border-radius:2px;overflow:hidden;display:none}
#volume-meter.active{display:block}
#volume-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--primary),var(--accent));border-radius:2px;transition:width 0.08s ease}
.modal-overlay{position:fixed;inset:0;z-index:100;background:rgba(0,0,0,0.6);backdrop-filter:blur(8px);display:none;align-items:flex-end;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:400px;padding:20px;max-height:70vh;overflow-y:auto;animation:slideUp 0.3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h2{font-size:16px;margin-bottom:16px}
.modal label{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--text-dim)}
.modal select,.modal input[type=range]{width:120px;background:var(--surface-hover);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:4px 8px;font-size:12px}
.modal input[type=range]{width:100px;accent-color:var(--primary)}
@media(min-width:640px){main{max-width:680px;margin:0 auto;width:100%}.modal-overlay{align-items:center}.modal{border-radius:20px}}
</style>
</head>
<body>
<canvas id="particles"></canvas>
<header>
  <div class="brand">🔮 <span>Mystic</span> <small>· Sonora Digital Corp</small></div>
  <div class="header-actions"><span id="status-dot" style="width:6px;height:6px;border-radius:50%;background:var(--primary);box-shadow:0 0 8px var(--primary)"></span><button class="btn-icon" id="btn-settings">⚙️</button></div>
</header>
<main>
  <div id="messages">
    <div class="welcome" id="welcome">
      <div class="avatar">🔮</div>
      <h1>Mystic</h1>
      <p>Tu asistente. Tu imperio digital.</p>
      <div class="hint">🎤 Di <strong>Hey Mystic</strong> o escribe aquí abajo</div>
    </div>
  </div>
  <div id="volume-meter"><div id="volume-fill"></div></div>
  <div class="input-area">
    <textarea id="input" rows="1" placeholder="Escribe o di 'Hey Mystic'..." autocomplete="off"></textarea>
    <div class="actions" style="display:flex;gap:6px">
      <button class="btn-icon" id="btn-mic">🎤</button>
      <button class="btn-icon" id="btn-send" style="background:var(--primary);color:white;border-color:var(--primary)">→</button>
    </div>
  </div>
</main>
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <h2>⚙️ Configuración</h2>
    <label>Idioma <select id="s-lang"><option value="es-MX">Español (MX)</option><option value="en-US">English</option></select></label>
    <label>Velocidad TTS <input type="range" id="s-tts-rate" min="50" max="150" value="120"></label>
    <label>Silencio (seg) <input type="range" id="s-timeout" min="2" max="10" value="3"></label>
    <label><span>TTS activado</span> <input type="checkbox" id="s-tts" checked style="accent-color:var(--primary)"></label>
    <label><span>Wake word</span> <input type="checkbox" id="s-wake-en" checked style="accent-color:var(--primary)"></label>
    <label style="justify-content:center;padding:16px 0;border:none"><button class="btn-icon" id="btn-close-settings" style="width:auto;padding:8px 24px;font-size:13px">Cerrar</button></label>
  </div>
</div>
<script>
const state={messages:[],sessionId:'default',listening:false,ttsEnabled:true,wakeEnabled:true,timeout:3000,wakeRecognition:null,recognition:null,silenceTimer:null}
const $=s=>document.querySelector(s)
const canvas=document.getElementById('particles'),ctx=canvas.getContext('2d')
canvas.width=window.innerWidth;canvas.height=window.innerHeight
const pts=[];for(let i=0;i<50;i++)pts.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-0.5)*0.3,vy:(Math.random()-0.5)*0.3,r:Math.random()*2,a:Math.random()*0.3+0.1})
function draw(){ctx.clearRect(0,0,canvas.width,canvas.height);pts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=canvas.width;if(p.x>canvas.width)p.x=0;if(p.y<0)p.y=canvas.height;if(p.y>canvas.height)p.y=0;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fillStyle=`rgba(108,92,231,${p.a})`;ctx.fill()});requestAnimationFrame(draw)};draw()
window.addEventListener('resize',()=>{canvas.width=window.innerWidth;canvas.height=window.innerHeight})
const WAKE_WORDS=['hey mystic','oye mystic','hey jarvis','oye jarvis']
function startWakeWord(){if(!('webkitSpeechRecognition'in window)||state.wakeRecognition)return
const r=new webkitSpeechRecognition();r.lang='es-MX';r.continuous=true;r.interimResults=true
r.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal){const t=e.results[i][0].transcript.toLowerCase().trim();if(WAKE_WORDS.some(w=>t.includes(w)))startVoiceInput()}}}
r.onerror=()=>{setTimeout(startWakeWord,2000)};state.wakeRecognition=r;r.start()}
function stopWakeWord(){if(state.wakeRecognition){try{state.wakeRecognition.stop()}catch(e){}state.wakeRecognition=null}}
function startVoiceInput(){if(!('webkitSpeechRecognition'in window)||state.listening)return
const r=new webkitSpeechRecognition();r.lang='es-MX';r.continuous=false;r.interimResults=true
$('#btn-mic').classList.add('speaking');$('#volume-meter').classList.add('active');state.listening=true;let finalText=''
r.onresult=e=>{for(let i=e.resultIndex;i<e.results.length;i++){if(e.results[i].isFinal)finalText+=e.results[i][0].transcript}
$('#volume-fill').style.width=`${Math.random()*50+10}%`
if(state.silenceTimer)clearTimeout(state.silenceTimer)
state.silenceTimer=setTimeout(()=>{try{r.stop()}catch(e){}stopVoiceInput()},state.timeout||3000)}
r.onend=()=>{stopVoiceInput();if(finalText.trim()){$('#input').value=finalText;sendMessage()}}
r.onerror=()=>stopVoiceInput();r.start();state.recognition=r}
function stopVoiceInput(){$('#btn-mic').classList.remove('speaking');$('#volume-meter').classList.remove('active');state.listening=false;state.recognition=null;if(state.silenceTimer)clearTimeout(state.silenceTimer)}
async function sendMessage(){const text=$('#input').value.trim();if(!text)return;$('#input').value='';addMessage('user',text);stopVoiceInput()
const typing=document.createElement('div');typing.id='typing';typing.innerHTML='<div style="display:flex;gap:10px;margin-bottom:12px"><div class="avatar-sm">🔮</div><div class="typing"><span></span><span></span><span></span></div></div>'
messagesEl.appendChild(typing);messagesEl.scrollTop=messagesEl.scrollHeight
try{const resp=await fetch(`/api/chat/${state.sessionId}/stream?message=${encodeURIComponent(text)}`)
const reader=resp.body.getReader();let responseText=''
while(true){const{done,value}=await reader.read();if(done)break
const chunk=new TextDecoder().decode(value);const lines=chunk.split('\n').filter(l=>l.startsWith('data:'))
for(const line of lines){try{const d=JSON.parse(line.slice(6));if(d.token)responseText+=d.token}catch(e){}}}
document.getElementById('typing')?.remove()
if(responseText.trim()){addMessage('mystic',responseText.trim())
if(state.ttsEnabled&&'speechSynthesis'in window){window.speechSynthesis.cancel()
const u=new SpeechSynthesisUtterance(responseText.trim().slice(0,300));u.lang='es-MX';u.rate=1.3
const v=window.speechSynthesis.getVoices().find(v=>v.lang.startsWith('es'));if(v)u.voice=v;window.speechSynthesis.speak(u)}}}catch(e){document.getElementById('typing')?.remove();addMessage('mystic','Error. Intenta de nuevo.')}}
function addMessage(role,content){document.getElementById('welcome')?.remove()
const div=document.createElement('div');div.className=`msg ${role}`
const b=document.createElement('div');b.className='bubble'
b.innerHTML=`<div>${escapeHtml(content)}</div><span class="time">${new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'})}</span>`
if(role==='mystic'){const a=document.createElement('div');a.className='avatar-sm';a.textContent='🔮';div.appendChild(a)}
div.appendChild(b);document.getElementById('messages').appendChild(div);document.getElementById('messages').scrollTop=document.getElementById('messages').scrollHeight}
function escapeHtml(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
$('#input').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMessage()}})
$('#input').addEventListener('input',function(){this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'})
$('#btn-send').addEventListener('click',sendMessage)
$('#btn-mic').addEventListener('click',()=>state.listening?stopVoiceInput():startVoiceInput())
$('#btn-settings').addEventListener('click',()=>{$('#settings-modal').classList.add('open');loadSettings()})
$('#btn-close-settings').addEventListener('click',()=>{saveSettingsUI();$('#settings-modal').classList.remove('open')})
$('#settings-modal').addEventListener('click',e=>{if(e.target===$('#settings-modal')){saveSettingsUI();$('#settings-modal').classList.remove('open')}})
function loadSettings(){const s=JSON.parse(localStorage.getItem('mystic-settings')||'{}')
if(s.lang)$('#s-lang').value=s.lang;if(s.ttsRate)$('#s-tts-rate').value=s.ttsRate
if(s.timeout)$('#s-timeout').value=s.timeout
if(s.ttsEnabled!==undefined)$('#s-tts').checked=s.ttsEnabled
if(s.wakeEnabled!==undefined)$('#s-wake-en').checked=s.wakeEnabled}
function saveSettingsUI(){const s={lang:$('#s-lang').value,ttsRate:$('#s-tts-rate').value,timeout:$('#s-timeout').value,ttsEnabled:$('#s-tts').checked,wakeEnabled:$('#s-wake-en').checked}
localStorage.setItem('mystic-settings',JSON.stringify(s))
state.ttsEnabled=s.ttsEnabled;state.wakeEnabled=s.wakeEnabled;state.timeout=parseInt(s.timeout)*1000
if(s.wakeEnabled)startWakeWord();else stopWakeWord()}
const messagesEl=document.getElementById('messages')
if(state.wakeEnabled)startWakeWord();loadSettings()
$('#s-tts-rate').addEventListener('input',function(){document.querySelectorAll('audio').forEach(a=>a.remove())})
</script>
</body>
</html>
