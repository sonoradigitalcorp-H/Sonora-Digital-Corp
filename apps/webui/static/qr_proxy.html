<!DOCTYPE html>
<html>
<head><title>Mystic WA — QR</title>
<meta http-equiv="refresh" content="10">
<style>body{font-family:sans-serif;text-align:center;padding:2rem;background:#0a0a1a;color:#fff}img{max-width:300px;border-radius:12px;box-shadow:0 0 30px rgba(0,212,255,0.3)}</style>
</head>
<body>
<h2>Escanea con WhatsApp</h2>
<p id="status">Cargando...</p>
<img id="qr" src="" alt="QR"/>
<script>
async function loadQR() {
  try {
    const r = await fetch('/api/wa-qr');
    const d = await r.json();
    document.getElementById('status').textContent = 'Estado: ' + d.state;
    if (d.qr) document.getElementById('qr').src = d.qr;
    else document.getElementById('qr').alt = 'QR no disponible';
  } catch(e) {
    document.getElementById('status').textContent = 'Error: ' + e.message;
  }
}
loadQR();
setInterval(loadQR, 10000);
</script>
</body>
</html>
