- vars:
    lead_name: "Diana"
    company: "Moda Express"
    objective: "Vender agente AI para atención al cliente 24/7"
    context: "Tienda online de ropa, 200 pedidos/día, 3 personas en soporte"
    tone: "directo, orientado a números"
    history: "Sin llamadas previas"
  assert:
    - type: contains-all
      value: ["Sonora Digital Corp", "conversión", "cliente"]
