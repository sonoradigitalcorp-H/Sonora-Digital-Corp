- vars:
    transcript: "Consultor: Esto resuelve exactamente lo que necesito. Últimamente paso 10 horas a la semana calificando leads que no son mi perfil. Agente: Podemos tenerlo listo mañana."
    duration: "6m"
    objective: "Vender agente AI para calificar prospectos"
  assert:
    - type: is-json
    - type: contains
      value: "hot"
- vars:
    transcript: "Abogado: Suena bien pero necesito pensarlo. ¿Me envías más info? Agente: Claro, te mando el caso de estudio y te llamo la próxima semana."
    duration: "4m"
    objective: "Vender agente AI para agendar consultas"
  assert:
    - type: is-json
    - type: contains
      value: "warm"
