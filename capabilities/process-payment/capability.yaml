# process-payment capability — HAS-005
id: process-payment
name: Process Payment
version: 0.5.0
status: experimental
domain: finance
description: "Process payments via Stripe or Mercado Pago: charges, refunds, subscriptions, payout reconciliation"
entry:
  agent: finance-agent
  trigger: payment.process.requested
dependencies:
  - memory: business
  - memory: working
policies:
  max_cost: 0.05
  timeout_seconds: 30
  allowed_models: ["ollama/qwen3:4b-64k"]
events:
  emits:
    - payment.processed
    - payment.refunded
    - payment.failed
    - payment.reconciled
  consumes:
    - payment.process.requested
    - invoice.generated
