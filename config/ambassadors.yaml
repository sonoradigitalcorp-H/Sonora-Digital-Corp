# ═══════════════════════════════════════════════════════════════
# 3. GAMIFICATION — Puntos por acciones
# ═══════════════════════════════════════════════════════════════
gamification:
  points:
    referral_signup: 10        # Alguien se registra con tu link
    referral_trial_start: 50   # Alguien activa su trial
    referral_trial_converted: 200  # El trial se convierte en pago
    direct_sale: 500           # Venta directa cerrada
    network_sale_level_1: 100  # Venta de tu red directa
    network_sale_level_2: 50   # Venta de red nivel 2
    course_completed: 100      # Completa curso de ventas
    social_share: 20           # Comparte en redes con su link
    daily_login: 5             # Entra al dashboard cada día

  achievements:
    first_sale:
      name: "Primera venta 🎉"
      points: 1000
      unlocks: "Badge de Hunter"
    network_10:
      name: "Red de 10 🌱"
      points: 2000
      unlocks: "10% más de comisión por 1 mes"
    network_50:
      name: "Red de 50 🌿"
      points: 5000
      unlocks: "Bono de $100 + 15% más de comisión por 1 mes"
    network_100:
      name: "Red de 100 🌳"
      points: 10000
      unlocks: "Bono de $300 + nivel automático a Warrior"

