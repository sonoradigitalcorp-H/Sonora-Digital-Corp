# SDC Enterprise Packages — White-label para partners
# Versión: 2.0.0
#
# Estructura enterprise wholesale:
#   TÚ (SDC) → cobras wholesale al partner
#   PARTNER (AztroTech, etc.) → cobra markup al cliente
#   CLIENTE → paga al partner, cree que es del partner

# ═══════════════════════════════════════════════════════════════
# ENTERPRISE WHOLESALE — Lo que los partners te pagan a ti
# ═══════════════════════════════════════════════════════════════
enterprise_wholesale:
  starter:
    name: "Enterprise Starter"
    setup_fee: 5000
    monthly: 2500
    seats: 3
    interactions_per_month: 5000
    clone_loras: 1
    clone_videos_per_month: 5
    support: "email (12h response)"
    suggested_resell_setup: [8000, 12000]
    suggested_resell_monthly: [4000, 6000]
    features:
      - "3 cerebros digitales (directivos)"
      - "5,000 interacciones AI/mes"
      - "1 LoRA facial + 1 clon de voz"
      - "5 videos generados/mes"
      - "Integración Slack/Teams"
      - "Dashboard ejecutivo básico"
    ideal_for: "Empresas 10-30 empleados"

  business:
    name: "Enterprise Business"
    setup_fee: 15000
    monthly: 7500
    seats: 10
    interactions_per_month: 20000
    clone_loras: 5
    clone_videos_per_month: 30
    support: "24/7 prioritario"
    suggested_resell_setup: [25000, 35000]
    suggested_resell_monthly: [12000, 18000]
    features:
      - "10 cerebros digitales (directivos + gerentes)"
      - "20,000 interacciones AI/mes"
      - "5 LoRAs faciales + 5 clones de voz"
      - "30 videos generados/mes"
      - "API pública + integraciones ERP/CRM"
      - "Dashboard ejecutivo con analytics"
      - "Reportes mensuales de ROI"
      - "Onboarding dedicado (3 sesiones)"
    ideal_for: "Empresas 30-200 empleados"

  premium:
    name: "Enterprise Premium"
    setup_fee: 25000
    monthly: 15000
    seats: -1
    interactions_per_month: 100000
    clone_loras: -1
    clone_videos_per_month: -1
    support: "Gerente de cuenta dedicado 24/7"
    suggested_resell_setup: [40000, 60000]
    suggested_resell_monthly: [25000, 40000]
    features:
      - "Cerebros digitales ilimitados"
      - "100,000+ interacciones AI/mes"
      - "LoRAs ilimitados + clones de voz"
      - "Videos ilimitados"
      - "Infraestructura dedicada (VPC privada)"
      - "On-premise opcional"
      - "SLA 99.99%"
      - "Gerente de cuenta dedicado 24/7"
      - "Training presencial para todo el equipo"
    ideal_for: "Empresas 200+ empleados o corporativos"

# ═══════════════════════════════════════════════════════════════
# POWERED BY SDC — Descuentos por visibilidad
# ═══════════════════════════════════════════════════════════════
# El partner puede elegir mostrar (o no) "Powered by SDC"
# Gana descuento sobre su wholesale si lo muestra
powered_by_sdc:
  hidden:
    label: "Sin powered by SDC"
    discount_pct: 0
    description: "El cliente NO ve SDC por ningún lado. White-label puro."
    requirement: "Sin cambios"

  footer_only:
    label: "Powered by SDC en footer"
    discount_pct: 5
    description: "Aparece 'Powered by Sonora Digital Corp' en footer del dashboard y emails."
    requirement: "Texto en footer del dashboard, emails automáticos"

  public_mentions:
    label: "Powered by SDC en footer + menciones públicas"
    discount_pct: 7
    description: "Footer + el partner menciona SDC en redes sociales, casos de éxito públicos."
    requirement: "Footer + 1 mención pública/mes (LinkedIn, web, caso de éxito)"

  full_branding:
    label: "Powered by SDC completo"
    discount_pct: 10
    description: "Footer + menciones + logo SDC en el dashboard del cliente + caso de éxito público detallado."
    requirement: "Footer + menciones + logo visible + caso de éxito público"
