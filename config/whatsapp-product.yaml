# WhatsApp + Social Media Automation — SDC Product
# Version: 1.0.0

# ═══════════════════════════════════════════════════════════════
# PRODUCT DESCRIPTION
# ═══════════════════════════════════════════════════════════════
name: "WhatsApp Automation"
tagline: "Tu negocio en WhatsApp 24/7. Clientes, ventas, soporte, onboarding — todo automatico."
description: "Sistema completo de automatización de WhatsApp + redes sociales para empresas. 
  Incluye chatbot AI, respuestas automaticas, broadcasting, onboarding de clientes, 
  y analítica de conversaciones. Corre sobre la plataforma SDC."

# ═══════════════════════════════════════════════════════════════
# FEATURES
# ═══════════════════════════════════════════════════════════════
features:
  core:
    - name: "Chatbot AI 24/7"
      description: "Responde clientes al instante con AI. Ventas, soporte, FAQs."
    - name: "Onboarding automatico"
      description: "Cuando un cliente se registra, recibe bienvenida + tutorial por WhatsApp."
    - name: "Broadcasting segmentado"
      description: "Envía promociones, ofertas, contenido a segmentos especificos."
    - name: "Respuestas rapidas"
      description: "Plantillas para preguntas frecuentes con un solo clic."
    - name: "Analítica de conversaciones"
      description: "Reportes semanales: volumen, temas, sentimiento, conversion."

  advanced:
    - name: "Flujos conversacionales"
      description: "Crea embudos de venta completos dentro de WhatsApp."
    - name: "Integración CRM"
      description: "Cada conversacion se guarda en tu CRM automaticamente."
    - name: "Pagos por WhatsApp"
      description: "Genera links de pago y cobra dentro de la conversacion."
    - name: "Multi-agente"
      description: "Varios agentes humanos + AI trabajando juntos."
    - name: "API abierta"
      description: "Conecta con n8n, HubSpot, Shopify, lo que necesites."

  social_media:
    - name: "Publicación automática"
      description: "Programa y publica en Instagram, TikTok, Facebook, LinkedIn."
    - name: "Contenido con tu clone"
      description: "Fotos y videos generados por AI con tu identidad para redes."
    - name: "Analítica multiplataforma"
      description: "Un dashboard para todas tus redes sociales."
    - name: "Respuesta automatica en redes"
      description: "Comentarios y DMs respondidos automaticamente."
    - name: "Giveaways y promociones"
      description: "Crea sorteos, descuentos, campañas virales automaticas."

# ═══════════════════════════════════════════════════════════════
# WHAT THE CLIENT PROVIDES
# ═══════════════════════════════════════════════════════════════
what_client_provides:
  - "Numero de WhatsApp Business API (o usamos el nuestro como gateway)"
  - "Acceso a sus redes sociales (Instagram, TikTok, Facebook)"
  - "Informacion de su negocio: productos, precios, horarios, FAQs"
  - "Logos, colores, identidad visual para el bot"
  - "Base de clientes inicial (opcional, para broadcasting)"
  - "Objetivos de venta: que quieren vender, a quien, cuanto"

what_sdc_provides:
  - "Numero WhatsApp + gateway configurado"
  - "Bot AI entrenado con su negocio"
  - "Onboarding flow automatico"
  - "Dashboard de conversaciones"
  - "Reportes semanales"
  - "Soporte 24/7"

