# ═══════════════════════════════════════════════════════════════
# AUTOMATIC SALES SYSTEM (engine)
# ═══════════════════════════════════════════════════════════════
auto_sales:
  hot_sales:
    description: "Ventas relampago automaticas via WhatsApp a clientes calificados"
    triggers:
      - "Cliente inactivo >7 dias → oferta especial"
      - "Cliente cerca de limite de plan → upgrade suggest"
      - "Cliente que pregunto por X y no compro → seguimiento"
      - "Cliente feliz → referral request"
    frequency: "Diario (analisis 3AM + ejecución 9AM)"

  giveaways:
    description: "Sorteos y promociones automaticas para engagement"
    triggers:
      - "Embajador nuevo → giveaway de bienvenida"
      - "Cliente cumple meses → descuento especial"
      - "Red social alcanza meta → sorteo automatico"
    frequency: "Semanal"

  promotions:
    description: "Promociones segmentadas por comportamiento"
    triggers:
      - "Alto uso de fotos → descuento en pack de videos"
      - "Cliente Pro por 6 meses → upgrade gratis 1 mes"
      - "Embajador top → bono especial"
    frequency: "Quincenal"

# ═══════════════════════════════════════════════════════════════
# ONBOARDING FLOW (automatico)
# ═══════════════════════════════════════════════════════════════
onboarding_flow:
  step_1_welcome:
    delay: "inmediato"
    action: "send_whatsapp"
    message: "¡Bienvenido a [nombre_empresa]! 🎉 Soy tu asistente virtual. Estoy aqui para ayudarte."
  
  step_2_setup:
    delay: "5 min"
    action: "send_whatsapp"
    message: "Para empezar, cuentame sobre tu negocio: ¿que vendes? ¿a quien? ¿horarios?"
  
  step_3_training:
    delay: "1 hora"
    action: "send_whatsapp"
    message: "Genial. Ya se sobre tu negocio. ¿Quieres que te muestre lo que puedo hacer? Prueba preguntandome: '¿Que productos tienes?'"
  
  step_4_activation:
    delay: "24 horas"
    action: "send_whatsapp"
    message: "¿Como va todo? Si necesitas algo, solo dime. PD: Tus clientes ya pueden escribirme 🤖"
  
  step_5_report:
    delay: "7 dias"
    action: "send_whatsapp + send_email"
    message: "Tu primera semana conmigo: [stats]. Has recibido X consultas, respondi Y, Z se convirtieron en ventas."

