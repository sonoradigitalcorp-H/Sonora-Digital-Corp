secrets:
  method: age
  version: "1.2.1"
  files:
    - path: "/home/ubuntu/.hermes/auth.json.age"
      decrypt_key: "/home/ubuntu/.age/key.txt"
      machine: sdc-prod
      notes: "Hermes API keys (opencode-go + OpenRouter)"
    - path: "/home/ubuntu/.local/share/opencode/auth.json.age"
      decrypt_key: "/home/ubuntu/.age/key.txt"
      machine: sdc-prod
      notes: "OpenClaw auth"

    - path: ".env.age"
      decrypt_key: "~/.age/key.txt"
      machine: laptop
      notes: "Telegram tokens, Redis password"

    - path: "config/.secrets/clients.json.age"
      decrypt_key: "~/.age/key.txt"
      machine: laptop
      notes: "Client secrets"

    - path: ".env.age"
      decrypt_key: "~/.age/key.txt"
      machine: sdc-prod
      notes: "Telegram tokens, Redis password (VPS copy)"

    - path: "config/.secrets/clients.json.age"
      decrypt_key: "~/.age/key.txt"
      machine: sdc-prod
      notes: "Client secrets (VPS copy)"

backup:
  include_secrets: true
  command: "scripts/decrypt-env.sh"
  notes: "Secrets decrypted on restore via age key"

health:
  check_interval: 60
  alerts: telegram
  blackbox_targets:
    - "http://localhost:8000/health"
    - "http://localhost:6333/health"
    - "http://localhost:7474"
    - "http://localhost:5678/healthz"
    - "http://localhost:5180/api/health"
    - "http://localhost:8111/health"
    - "http://localhost:8080/"
    - "http://localhost:3001/"
    - "http://localhost:4000/health"
    - "http://localhost:11434/api/tags"
    - "http://localhost:3000/health"
