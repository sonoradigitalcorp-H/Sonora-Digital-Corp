networking:
  policy: "Policy P3 — No service binds 0.0.0.0 without nginx proxy"
  ssl_path: "/etc/letsencrypt/live/"
  ssl_permissions: "755"  # fixed 2026-07-03
  nginx_sites:
    - domain: "api.sonoradigitalcorp.com"
      ssl: true
      cert: "api.sonoradigitalcorp.com"
      upstreams:
        - "127.0.0.1:8111"  # ABE API
        - "127.0.0.1:5174"  # Web UI
    - domain: "mystika.sonoradigitalcorp.com"
      ssl: false
      upstreams:
        - "127.0.0.1:3001"  # Mystika Web
        - "127.0.0.1:4000"  # Mystika API

