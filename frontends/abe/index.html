<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ABE Music Group — Record Label & Artist Management</title>
<link rel="stylesheet" href="/style.css">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%236c5ce7'/><text x='16' y='22' text-anchor='middle' fill='white' font-size='18' font-weight='bold'>A</text></svg>">
</head>
<body>
<div class="bg-ambient"></div>
<canvas id="network-canvas"></canvas>

<nav class="nav" id="navbar">
  <div class="nav-inner">
    <a href="#/" class="nav-logo" onclick="navigate(event)">
      <span class="nav-logo-icon">A</span>
      <span>ABE <span style="opacity:0.4">Music</span> <span style="color:var(--abe-gold)">Group</span></span>
    </a>
    <div class="nav-links" id="nav-links">
      <a href="#/" class="nav-link" data-page="home" onclick="navigate(event)">Home</a>
      <a href="#/services" class="nav-link" data-page="services" onclick="navigate(event)">Services</a>
      <a href="#/artists" class="nav-link" data-page="artists" onclick="navigate(event)">Artists</a>
      <a href="#/portal" class="nav-link" data-page="portal" onclick="navigate(event)">Portal</a>
      <a href="#/admin" class="nav-link" data-page="admin" onclick="navigate(event)">Admin</a>
    </div>
    <div class="nav-actions">
      <a href="#/login" class="btn btn-sm btn-secondary" onclick="navigate(event)">Sign In</a>
      <a href="#/contact" class="btn btn-sm btn-primary" onclick="navigate(event)">Get Started</a>
      <button class="nav-hamburger" onclick="toggleMobileNav()">☰</button>
    </div>
  </div>
</nav>

<main id="app">
  <div id="page-home" class="page"></div>
  <div id="page-services" class="page"></div>
  <div id="page-artists" class="page"></div>
  <div id="page-portal" class="page"></div>
  <div id="page-admin" class="page"></div>
  <div id="page-login" class="page"></div>
  <div id="page-contact" class="page"></div>
</main>

<script>
function toggleMobileNav() {
  document.getElementById("nav-links").classList.toggle("open");
}
document.addEventListener("click", function(e) {
  var nav = document.getElementById("nav-links");
  if (nav.classList.contains("open") && !e.target.closest(".nav")) {
    nav.classList.remove("open");
  }
});
</script>
<script src="/main.js"></script>
</body>
</html>
