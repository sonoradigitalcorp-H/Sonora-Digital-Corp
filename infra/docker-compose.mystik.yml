version: "3.8"

services:
  # ── Lobe Chat (UI) ──
  lobe-chat:
    image: lobehub/lobe-chat:latest
    container_name: sdc-lobe-chat
    ports:
      - "3210:3210"
    env_file: ../products/mystik/lobe-config.env
    environment:
      - DATABASE_URL=postgresql://mystik:mystik2026@postgres:5432/mystik
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - sdc-net

  # ── Mystik Backend ──
  mystik-api:
    build: ../products/production/mystik
    container_name: sdc-mystik-api
    network_mode: host
    environment:
      - MYSTIK_OPENCODE_KEY=${OPENCODE_API_KEY}
      - MYSTIK_OPENROUTER_KEY=${OPENROUTER_API_KEY}
      - MYSTIK_LLM_MODEL=cohere/north-mini-code:free
      - MYSTIK_OMNIVOICE_URL=http://127.0.0.1:3900
      - MYSTIK_CONTENT_STUDIO_URL=http://127.0.0.1:8765
      - MYSTIK_ABE_CRM_URL=http://127.0.0.1:5180
      - MYSTIK_TWENTY_API_URL=http://127.0.0.1:3002
      - MYSTIK_CHROMA_HOST=127.0.0.1
    depends_on:
      - twenty
      - chroma
    restart: unless-stopped

  # ── Twenty CRM ──
  twenty:
    build: ../infra/twenty
    container_name: sdc-twenty
    ports:
      - "3002:3000"
    environment:
      - PG_DATABASE_URL=postgres://mystik:mystik2026@postgres:5432/mystik
      - SERVER_URL=https://mystik.sonoradigitalcorp.com
      - CACHE_ENABLED=false
      - REDIS_URL=redis://mystik-redis:6379
      - TIMEOUT=30
    depends_on:
      - postgres
      - redis
    restart: unless-stopped
    networks:
      - sdc-net

  # ── ChromaDB ──
  chroma:
    image: chromadb/chroma:latest
    container_name: sdc-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma-data:/chroma/data
    restart: unless-stopped
    networks:
      - sdc-net

  # ── LiveKit (voz) ──

  livekit:
    image: livekit/livekit-server:latest
    container_name: sdc-livekit
    ports:
      - "7880:7880"
    command: --dev
    restart: unless-stopped
    networks:
      - sdc-net

  # ── Redis ──
  redis:
    image: redis:7-alpine
    container_name: sdc-mystik-redis
    ports:
      - "6380:6379"
    restart: unless-stopped
    networks:
      - sdc-net

  # ── PostgreSQL ──
  postgres:
    image: postgres:16-alpine
    container_name: sdc-mystik-db
    environment:
      POSTGRES_USER: mystik
      POSTGRES_PASSWORD: mystik2026
      POSTGRES_DB: mystik
    ports:
      - "5433:5432"
    volumes:
      - mystik-db:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - sdc-net

volumes:
  chroma-data:
  mystik-db:

networks:
  sdc-net:
    external: true
    name: sdc_default
