# Sonora OS — Full Stack
# Hasura + Supabase + OmniVoice + Engine + MCP + Bot + Playwright
services:

  # ─── Network ───
  sonora-network:
    driver: bridge
    external: false

  # ─── PostgreSQL (shared) ───
  postgres:
    image: postgres:16-alpine
    container_name: sonora-pg
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: sonora
      POSTGRES_USER: sonora
      POSTGRES_PASSWORD: ${PG_PASSWORD:-sonora2026}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonora"]
      interval: 5s; timeout: 3s; retries: 10
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Redis ───
  redis:
    image: redis:7-alpine
    container_name: sonora-redis
    ports: ["6379:6379"]
    command: redis-server --bind 0.0.0.0 --requirepass ${REDIS_PASSWORD:-redis2026}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis2026}", "PING"]
      interval: 5s; timeout: 3s; retries: 5
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Qdrant ───
  qdrant:
    image: qdrant/qdrant:latest
    container_name: sonora-qdrant
    ports: ["6333:6333", "6334:6334"]
    volumes: [qdrant_data:/qdrant/storage]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Neo4j ───
  neo4j:
    image: neo4j:5
    container_name: sonora-neo4j
    ports: ["7474:7474", "7687:7687"]
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-neo4j2026}
    volumes: [neo4j_data:/data]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Hasura ───
  hasura:
    image: hasura/graphql-engine:v2.42.0
    container_name: sonora-hasura
    ports: ["8080:8080"]
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgresql://sonora:${PG_PASSWORD:-sonora2026}@postgres:5432/sonora
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_SECRET:-sonora-admin}
      HASURA_GRAPHQL_JWT_SECRET: '{"type":"HS256","key":"sonora-jwt-2026-secret-key"}'
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
    depends_on: [postgres]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Supabase Auth (GoTrue) ───
  gotrue:
    image: supabase/gotrue:latest
    container_name: sonora-gotrue
    ports: ["54321:54321"]
    environment:
      GOTRUE_API_HOST: 0.0.0.0
      API_EXTERNAL_URL: http://localhost:54321
      GOTRUE_SITE_URL: http://localhost:5100
      GOTRUE_MAILER_AUTOCONFIRM: "true"
      DATABASE_URL: postgresql://sonora:${PG_PASSWORD:-sonora2026}@postgres:5432/sonora?sslmode=disable
      GOTRUE_DB_DRIVER: postgres
      GOTRUE_JWT_SECRET: sonora-jwt-2026-secret-key
      GOTRUE_JWT_EXP: 86400
      GOTRUE_EXTERNAL_GOOGLE_ENABLED: "true"
      GOTRUE_EXTERNAL_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOTRUE_EXTERNAL_GOOGLE_SECRET: ${GOOGLE_CLIENT_SECRET:-}
    depends_on: [postgres]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── OmniVoice ───
  omnivoice:
    image: ghcr.io/debpalash/omnivoice-studio:stable
    container_name: sonora-omnivoice
    ports: ["3900:3900"]
    volumes:
      - omnivoice_data:/app/omnivoice_data
      - /home/ubuntu/.cache/huggingface:/root/.cache/huggingface
    networks: [sonora-network]
    restart: unless-stopped
    mem_limit: 2g

  # ─── Sonora Engine ───
  engine:
    build:
      context: ..
      dockerfile: apps/sonora_engine/Dockerfile
    container_name: sonora-engine
    ports: ["5100:5100"]
    environment:
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_SECRET:-sonora-admin}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis2026}@redis:6379/0
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6333
      NEO4J_URI: bolt://neo4j:7687
      SUPABASE_URL: http://gotrue:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-anon-key}
      OMNIVOICE_URL: http://omnivoice:3900
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      STRIPE_API_KEY: ${STRIPE_API_KEY:-sk_test_placeholder}
    depends_on: [postgres, redis, hasura, gotrue]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── MCP Gateway ───
  mcp-gateway:
    build:
      context: ..
      dockerfile: mcp/Dockerfile
    container_name: sonora-mcp
    ports: ["8180:8180"]
    environment:
      HASURA_URL: http://hasura:8080/v1/graphql
      HASURA_ADMIN_SECRET: ${HASURA_SECRET:-sonora-admin}
      SUPABASE_URL: http://gotrue:54321
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-anon-key}
      OMNIVOICE_URL: http://omnivoice:3900
      PLAYWRIGHT_HEADLESS: "true"
    depends_on: [hasura, gotrue, omnivoice]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Telegram Bot ───
  telegram-bot:
    build:
      context: ..
      dockerfile: apps/sonora_bot/Dockerfile
    container_name: sonora-bot
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis2026}@redis:6379/0
    depends_on: [redis]
    networks: [sonora-network]
    restart: unless-stopped

  # ─── Open Notebook (RAG) ───
  open-notebook:
    image: lfnovo/open_notebook:latest-single
    container_name: sonora-notebook
    ports: ["8502:8502", "5055:5055"]
    volumes: [notebook_data:/app/data]
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OLLAMA_API_BASE: http://host.docker.internal:11434
      QDRANT_URL: http://qdrant:6333
    networks: [sonora-network]
    restart: unless-stopped

volumes:
  pg_data: redis_data: qdrant_data: neo4j_data: omnivoice_data: notebook_data:

networks:
  sonora-network:
    driver: bridge
