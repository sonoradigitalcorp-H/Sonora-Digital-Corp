services:
  postgres:
    image: postgres:15
    container_name: sdc-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: sdc
      POSTGRES_USER: sdc
      POSTGRES_PASSWORD: sdc2026prod
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdc"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: sdc-redis
    ports:
      - "127.0.0.1:6379:6379"
    command: ["redis-server", "--requirepass", "sdc2026prod", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "sdc2026prod", "PING"]
      interval: 10s
      timeout: 5s
      retries: 3

  neo4j:
    build: ./infra/docker/neo4j
    container_name: sdc-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-jarvis2026}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-jarvis2026}
      - NEO4J_dbms_memory_heap_max__size=256M
      - NEO4J_dbms_memory_pagecache_size=128M
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  qdrant:
    build: ./infra/docker/qdrant
    container_name: sdc-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  mcp-server:
    build: ./infra/docker/mcp-server
    container_name: sdc-mcp-server
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=jarvis2026
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

  n8n:
    image: n8nio/n8n:latest
    container_name: sdc-n8n
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=sdc-postgres
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=sdc
      - DB_POSTGRESDB_USER=sdc
      - DB_POSTGRESDB_PASSWORD=sdc2026prod
      - N8N_HOST=n8n.sonoradigitalcorp.com
      - N8N_PROTOCOL=https
      - N8N_PORT=5678
      - N8N_METRICS=false
      - N8N_SKIP_WEBHOOK_DEREGISTRATION_SHUTDOWN=true
      - WEBHOOK_URL=https://n8n.sonoradigitalcorp.com/
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - n8n_data:/home/node/.n8n
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  telegram-bot:
    build: ./platforms/telegram
    container_name: sdc-telegram-bot
    ports:
      - "127.0.0.1:3003:3003"
    environment:
      - ABE_TELEGRAM_TOKEN=8665900402:AAG0PW36xvlXybG7Heyu-TK9CUFeiVhAa0U
      - ABE_TELEGRAM_CHAT=5738935134
      - ABE_FENIX_BOT_TOKEN=8782296127:AAHO6Fx7U6WfvS8AyD5h6rLYqc5wJ7Sf3nY
    networks:
      - sdc-network
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    container_name: sdc-langfuse
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@langfuse-db:5432/langfuse
      - NEXTAUTH_SECRET=sdc-langfuse-secret-2026
      - NEXTAUTH_URL=http://localhost:3000
      - SALT=sdc-langfuse-salt-2026
      - TELEMETRY_ENABLED=false
    depends_on:
      langfuse-db:
        condition: service_healthy
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/public/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  langfuse-db:
    image: postgres:15
    container_name: sdc-langfuse-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=langfuse
    volumes:
      - langfuse_data:/var/lib/postgresql/data
    networks:
      - sdc-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

networks:
  sdc-network:
    driver: bridge
    external: true

volumes:
  pg_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  qdrant_snapshots:
  n8n_data:
  langfuse_data:
