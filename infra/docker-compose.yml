version: '3.8'

services:
  # Neo4j - Base de datos de grafos para memoria
  neo4j:
    build: ./docker/neo4j
    container_name: jarvis-neo4j
    ports:
      - "127.0.0.1:7474:7474"  # HTTP (solo local)
      - "127.0.0.1:7687:7687"  # Bolt (solo local)
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-jarvis2026}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-jarvis2026}
      - NEO4J_dbms_memory_heap_max__size=256M
      - NEO4J_dbms_memory_pagecache_size=128M
      - NEO4J_apoc_export_file_enabled=true
      - NEO4J_apoc_import_file_enabled=true
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Qdrant - Base de datos vectorial para embeddings
  qdrant:
    build: ./docker/qdrant
    container_name: jarvis-qdrant
    ports:
      - "6333:6333"  # HTTP
      - "6334:6334"  # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
      - qdrant_snapshots:/qdrant/snapshots
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "-O", "/dev/null", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # MCP Server - Model Context Protocol
  mcp-server:
    build: ./docker/mcp-server
    container_name: jarvis-mcp-server
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=jarvis2026
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - MCP_HOST=0.0.0.0
      - MCP_PORT=8000
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - jarvis-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s

networks:
  jarvis-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  qdrant_storage:
  qdrant_snapshots:
