global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mcp-server"
    static_configs:
      - targets: ["localhost:8000"]
    metrics_path: "/health"

  - job_name: "n8n"
    static_configs:
      - targets: ["localhost:5678"]
    metrics_path: "/healthz"

  - job_name: "abe-api"
    static_configs:
      - targets: ["localhost:8111"]
    metrics_path: "/health"

  - job_name: "node"
    static_configs:
      - targets: ["localhost:9100"]
