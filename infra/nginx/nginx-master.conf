# nginx-master.conf — Entorno local (HTTP, sin SSL)
# Para VPS usa: nginx/nginx-vps.conf con Let's Encrypt

worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    upstream api_backend   { server sonora-api:8000; }
    upstream frontend_app  { server frontend:3000; }
    upstream n8n_service   { server n8n:5678; }

    server {
        listen 80;
        server_name localhost;

        location /api/  { proxy_pass http://api_backend/;  proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_read_timeout 120s; }
        location /auth/ { proxy_pass http://api_backend/auth/; proxy_set_header Host $host; }
        location /docs  { proxy_pass http://api_backend/docs;  proxy_set_header Host $host; }
        location /status { proxy_pass http://api_backend/status; proxy_set_header Host $host; }

        location /n8n/ {
            proxy_pass http://n8n_service/;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
        }

        location / {
            proxy_pass http://frontend_app;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr;
            proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
        }

        location /health { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }
    }
}
