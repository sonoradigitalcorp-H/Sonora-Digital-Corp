# nginx-master.conf — Entorno local (HTTP, sin SSL)
# Para VPS usa: nginx/nginx-vps.conf con Let's Encrypt

worker_processes auto;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    upstream mcp_gateway    { server sonora-mcp-gateway:18989; }
    upstream fastapi_legacy { server sonora-api:8000; }

    server {
        listen 80;
        server_name localhost;

        location / {
            proxy_pass http://mcp_gateway;
            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; proxy_set_header X-Tenant-ID $http_x_tenant_id;
            proxy_http_version 1.1; proxy_set_header Upgrade $http_upgrade; proxy_set_header Connection "upgrade";
            proxy_read_timeout 120s;
        }

        location /health { access_log off; return 200 "ok\n"; add_header Content-Type text/plain; }
    }
}
