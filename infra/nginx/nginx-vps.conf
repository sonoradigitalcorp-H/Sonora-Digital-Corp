# nginx-vps.conf — HTTPS con Let's Encrypt
# Certbot: /etc/letsencrypt/live/sonoradigitalcorp.com/

# ── Redirect HTTP → HTTPS ──
server {
    listen 80;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS principal ──
server {
    listen 443 ssl;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;

    ssl_certificate /etc/letsencrypt/live/sonoradigitalcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonoradigitalcorp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # ── API Contable + AI OS ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /docs {
        proxy_pass http://127.0.0.1:8000/docs;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://127.0.0.1:8000/redoc;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        proxy_pass http://127.0.0.1:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # ── Dashboard Next.js ──
    location /panel {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location /_next/ {
        proxy_pass http://127.0.0.1:3000/_next/;
        proxy_set_header Host $host;
    }

    # ── N8N ──
    location /n8n/ {
        proxy_pass http://127.0.0.1:5679/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check ──
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── Raíz → panel ──
    location = / {
        return 301 /panel/;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}

    # ── Landing pages estáticas ──
    location /hermes/ {
        alias /home/mystic/web/hermes/;
        index index.html;
        try_files $uri $uri/ /hermes/index.html;
    }
    location /contabilidad/ {
        alias /home/mystic/web/contabilidad/;
        index index.html;
    }
    location /nomina/ {
        alias /home/mystic/web/nomina/;
        index index.html;
    }
    location /academy/ {
        alias /home/mystic/web/academy/;
        index index.html;
    }
    location /fourgea-portal/ {
        alias /home/mystic/web/fourgea/;
        index index.html;
    }
