# nginx-vps.conf — HTTPS con Let's Encrypt
# Certbot: /etc/letsencrypt/live/sonoradigitalcorp.com/

# ── Redirect HTTP → HTTPS (dominios conocidos) ──
server {
    listen 80;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;
    return 301 https://$host$request_uri;
}

# ── Dominios auto-generados por ssl-auto.yml (GitHub Action) ──
include /etc/nginx/sites-enabled/ssl-auto-*.conf;

# ── HTTPS principal ──
server {
    listen 443 ssl;
    server_name sonoradigitalcorp.com www.sonoradigitalcorp.com;

    ssl_certificate /etc/letsencrypt/live/sonoradigitalcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sonoradigitalcorp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # ── Security Headers ──
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src 'self' https: wss:; font-src 'self' data:; object-src 'none'; frame-ancestors 'none';" always;

    server_tokens off;

    # ── MCP Gateway como Entry Point Único ──
    # Todo el routing se hace via MCP Gateway (:18989)
    location / {
        proxy_pass http://127.0.0.1:18989;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Tenant-ID $http_x_tenant_id;
        proxy_read_timeout 120s;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Health check (directo, sin auth) ──
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
