# ABE Music — nginx config
# Despues de obtener SSL: sudo certbot --nginx -d abe.sonoradigitalcorp.com

server {
    listen 80;
    server_name abe.sonoradigitalcorp.com music.sonoradigitalcorp.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name abe.sonoradigitalcorp.com music.sonoradigitalcorp.com;

    ssl_certificate /etc/letsencrypt/live/abe.sonoradigitalcorp.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/abe.sonoradigitalcorp.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 20M;

    # Landing page + ABE Web
    location / {
        proxy_pass http://127.0.0.1:5180;

    # ABE Landing page (static)
    location /landing {
        alias /var/www/abe-landing;
        index index.html;
        try_files $uri $uri/ =404;
    }
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ABE API
    location /api/ {
        proxy_pass http://127.0.0.1:5180;

    # ABE Landing page (static)
    location /landing {
        alias /var/www/abe-landing;
        index index.html;
        try_files $uri $uri/ =404;
    }
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ABE PWA
    location /pwa/ {
        proxy_pass http://127.0.0.1:5180;

    # ABE Landing page (static)
    location /landing {
        alias /var/www/abe-landing;
        index index.html;
        try_files $uri $uri/ =404;
    }
        proxy_set_header Host $host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # WebSocket
    location /ws {
        proxy_pass http://127.0.0.1:5180;

    # ABE Landing page (static)
    location /landing {
        alias /var/www/abe-landing;
        index index.html;
        try_files $uri $uri/ =404;
    }
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
