name: abe-content-factory-marketing-agent
version: 1.0.0
description: "marketing agent for ABE Content Factory"
model: llama3.2:3b
provider: ollama
capability: content-production
maturity: 2-Assisted
tools:
  - sonora:capability_resolve
  - sonora:media_image
  - sonora:media_album_cover
  - sonora:content_generate
policies:
  max_tokens_per_call: 4096
  timeout_seconds: 60
events:
  emits: []
  listens: []
lifecycle:
  spawn: on-demand
  max_idle: 30m
  max_concurrent: 3
