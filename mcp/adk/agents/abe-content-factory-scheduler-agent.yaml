name: abe-content-factory-scheduler-agent
version: 1.0.0
description: "scheduler agent for ABE Content Factory"
model: llama3.2:3b
provider: ollama
capability: agent-operations
maturity: 2-Assisted
tools:
  - sonora:capability_resolve
  - sonora:scheduler_list
  - sonora:scheduler_add
  - sonora:alerts_check
policies:
  max_tokens_per_call: 4096
  timeout_seconds: 60
events:
  emits: []
  listens: []
lifecycle:
  spawn: on-demand
  max_idle: 30m
  max_concurrent: 3
