name: abe-crm-agent
version: 1.0.0
description: "CRM de artistas — gestión de contactos, contratos, y relaciones con artistas ABE"
model: llama3.2:3b
provider: ollama
capability: client-onboarding
maturity: 2-Assisted
tools:
  - sonora:abe_list_artists
  - sonora:abe_get_artist
  - sonora:abe_create_artist
  - sonora:abe_ceo_dashboard
  - sonora:approvals_list
  - sonora:intake_query
  - sonora:intake_stats
  - sonora:enterprise_score
policies: { max_tokens_per_call: 4096, timeout_seconds: 60 }
events: { emits: [artist_crm_updated], listens: [artist_created] }
lifecycle: { spawn: on-demand, max_idle: 30m, max_concurrent: 3 }
