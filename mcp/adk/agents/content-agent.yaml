name: content-agent
version: 1.0.0
description: "Agente de contenido — genera, revisa y publica contenido multi-formato"
model: llama3.2:3b
provider: ollama
capability: content-production
maturity: 2-Assisted

tools:
  - sonora:content_generate
  - sonora:content_deliver
  - sonora:content_list
  - sonora:store_products
  - sonora:skills_system
  - sonora:enterprise_score

policies:
  max_tokens_per_call: 4096
  timeout_seconds: 60
  requires_review: content_generate

events:
  emits:
    - content_generated
    - content_published
  listens:
    - content_requested

lifecycle:
  spawn: on-demand
  max_idle: 30m
  max_concurrent: 3
