name: research-agent
version: 1.0.0
description: "Agente de investigación — busca información, sintetiza, analiza"
model: gemini-2.5-flash
provider: openrouter
capability: strategic-intelligence
maturity: 2-Assisted

tools:
  - sonora:capability_resolve
  - sonora:enterprise_score
  - sonora:health_all

policies:
  max_tokens_per_call: 8192
  timeout_seconds: 120

events:
  emits:
    - research_completed
  listens:
    - research_requested

lifecycle:
  spawn: on-demand
  max_idle: 15m
  max_concurrent: 3
