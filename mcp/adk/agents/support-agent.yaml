name: support-agent
version: 1.0.0
description: "Agente de soporte — tickets, consultas, escalamiento y resolución"
model: llama3.2:3b
provider: ollama
capability: support-operations
maturity: 2-Assisted

tools:
  - sonora:sessions_list
  - sonora:sessions_search
  - sonora:sessions_get
  - sonora:capability_resolve
  - sonora:enterprise_score
  - sonora:skills_system
  - sonora:health_all
  - sonora:webhook_healthcheck
  - sonora:approvals_list
  - sonora:incident_report

policies:
  max_tokens_per_call: 4096
  timeout_seconds: 60
  requires_escalation: true

events:
  emits:
    - ticket_created
    - ticket_resolved
    - ticket_escalated
  listens:
    - support_requested
    - incident_detected

lifecycle:
  spawn: on-demand
  max_idle: 30m
  max_concurrent: 5
