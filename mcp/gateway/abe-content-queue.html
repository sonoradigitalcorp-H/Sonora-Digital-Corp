<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>ABE Content Queue</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap');
:root{--bg:#0a0a12;--surface:rgba(255,255,255,.05);--border:rgba(255,255,255,.1);--text:#f0f0f0;--dim:rgba(255,255,255,.4);--gold:#FFD700;--accent:#7c5cfc;--green:#34d399;--radius:16px;--font:'Inter',-apple-system,sans-serif}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);padding:1.5rem;-webkit-font-smoothing:antialiased}
body::before{content:'';position:fixed;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle at 30% 20%,rgba(124,92,252,.08),transparent 50%),radial-gradient(circle at 70% 80%,rgba(255,215,0,.05),transparent 50%);z-index:-1}
.glass{background:var(--surface);backdrop-filter:blur(20px);border:1px solid var(--border);border-radius:var(--radius)}
h1{font-size:1.3rem;margin-bottom:.3rem}h1 span{color:var(--gold)}.sub{color:var(--dim);font-size:.8rem;margin-bottom:1.5rem}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:.8rem}
.card{padding:1rem;position:relative}
.card .icon{font-size:1.2rem}.card h3{font-size:.85rem;margin:.2rem 0}
.card .meta{font-size:.7rem;color:var(--dim);margin-bottom:.3rem}
.card .desc{font-size:.75rem;color:var(--dim);margin-bottom:.3rem}
.card .actions{display:flex;gap:.3rem;margin-top:.5rem}
.btn{padding:.25rem .6rem;border-radius:6px;border:none;font-family:var(--font);font-size:.7rem;cursor:pointer;transition:all .15s}
.btn-gold{background:var(--gold);color:#000}.btn-gold:hover{opacity:.85}
.btn-green{background:var(--green);color:#000}.btn-green:hover{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);font-size:.65rem}.btn-ghost:hover{border-color:var(--gold)}
.tag{display:inline-block;padding:.1rem .3rem;border-radius:3px;font-size:.6rem}
.tag-pending{background:rgba(251,191,36,.15);color:#fbbf24}
.tag-approved{background:rgba(52,211,153,.15);color:var(--green)}
.tag-rejected{background:rgba(248,113,113,.15);color:#f87171}
pre{font-size:.7rem;color:var(--dim);white-space:pre-wrap;max-height:200px;overflow:auto;margin-top:.3rem}
.tabs{display:flex;gap:0;margin-bottom:1rem;border-bottom:1px solid var(--border)}
.tab{padding:.4rem .8rem;cursor:pointer;font-size:.75rem;color:var(--dim);border-bottom:2px solid transparent}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}
.panel{display:none}.panel.active{display:block}
</style></head>
<body>
<h1>📋 <span style="color:var(--gold)">ABE</span> Content Queue</h1>
<p class="sub">Contenido generado · Revisa · Aprueba · Envía a Telegram</p>
<div class="tabs">
  <div class="tab active" onclick="switchTab('pending',this)">⏳ Pendientes</div>
  <div class="tab" onclick="switchTab('approved',this)">✅ Aprobados</div>
  <div class="tab" onclick="switchTab('generate',this)">🎨 Generar Ahora</div>
</div>
<div class="panel active" id="panel-pending"><div class="grid" id="pendingGrid"><div style="color:var(--dim);padding:1rem">Cargando...</div></div></div>
<div class="panel" id="panel-approved"><div class="grid" id="approvedGrid"><div style="color:var(--dim);padding:1rem">Cargando...</div></div></div>
<div class="panel" id="panel-generate">
  <div class="card glass" style="max-width:500px">
    <h3 style="margin-bottom:.5rem">🎨 Generar Contenido Nuevo</h3>
    <select id="genArtist" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.5rem;font-family:var(--font);font-size:.8rem;margin-bottom:.3rem"></select>
    <select id="genType" style="width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:.5rem;font-family:var(--font);font-size:.8rem;margin-bottom:.3rem">
      <option value="album_cover">💿 Album Cover</option>
      <option value="promotional">🖼️ Promocional</option>
      <option value="social_media">📱 Social Media</option>
      <option value="video_concept">🎬 Video Concept</option>
      <option value="announcement">📢 Announcement</option>
    </select>
    <button class="btn btn-gold" style="width:100%;margin-top:.3rem;padding:.5rem" onclick="generateContent()">🎨 Generar</button>
    <pre id="genResult" style="margin-top:.5rem"></pre>
  </div>
</div>
<script>
const G='http://127.0.0.1:18989';let t='';
async function a(){const r=await fetch(G+'/api/auth/token',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({client_id:'abe-fenix',client_secret:'abe_f3n1x_pr0_k3y_2026'})});const d=await r.json();t=d.access_token||''}
async function c(tool,p){if(!t)await a();const r=await fetch(G+'/api/call',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+t},body:JSON.stringify({tool,params:p||{}})});return await r.json()}
function switchTab(name,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');document.getElementById('panel-'+name).classList.add('active');
  if(name==='pending'||name==='approved')loadQueue();if(name==='generate')loadArtists();
}
async function loadQueue(){
  const p=await c('content_queue',{status:'pending_review'});
  const a=await c('content_queue',{status:'approved'});
  const render=(items,type)=>items.map(x=>`<div class="card glass"><div class="tag tag-${type==='pending'?'pending':'approved'}">${x.status}</div><div style="margin-top:.3rem"><span class="icon">${x.icon||'📄'}</span><h3>${x.artist}</h3><div class="meta">${x.type} · ${new Date(x.generated_at).toLocaleString()}</div><div class="desc">${x.description}</div>${
    type==='pending'?`<div class="actions"><button class="btn btn-green" onclick="approve('${x.id}','telegram')">✅ Telegram</button><button class="btn btn-gold" onclick="approve('${x.id}','dashboard')">📊 Dashboard</button><button class="btn btn-ghost" onclick="reject('${x.id}')">❌</button></div>`:''
  }</div></div>`).join('')||'<div style="color:var(--dim);padding:.5rem">No hay contenido '+type+'</div>';
  document.getElementById('pendingGrid').innerHTML=render(p.items||[],'pending');
  document.getElementById('approvedGrid').innerHTML=render(a.items||[],'approved');
}
async function approve(id,ch){const r=await c('content_approve',{content_id:id,channel:ch});loadQueue();}
async function reject(id){const r=await c('content_reject',{content_id:id});loadQueue();}
async function loadArtists(){
  const r=await c('abe_list_artists',{});
  const sel=document.getElementById('genArtist');
  sel.innerHTML='<option value="">Random artist</option>'+(r.artists||[]).map(x=>`<option value="${x.name}">${x.name}</option>`).join('');
}
async function generateContent(){
  const artist=document.getElementById('genArtist').value;
  const type=document.getElementById('genType').value;
  document.getElementById('genResult').textContent='⏳ Generando...';
  const r=await c('content_daily',{artist,type});
  document.getElementById('genResult').textContent=JSON.stringify(r,null,2).substring(0,1500);
  setTimeout(loadQueue,1000);
}
a().then(()=>{loadQueue();loadArtists();});
</script></body></html>
