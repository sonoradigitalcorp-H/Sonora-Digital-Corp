name: abe-weekly-report
description: "Reporte semanal ABE Music: KPIs → gráficos → notificar"
steps:
  - id: kpis
    agent: abe_ceo_dashboard
    input: "Genera dashboard completo de KPIs para ABE Music"
  - id: artist_details
    agent: abe_list_artists
    input: "Lista todos los artistas con sus métricas"
    depends_on: kpis
  - id: score
    agent: enterprise_score
    input: "Actualiza enterprise score con datos de ABE Music"
    depends_on: kpis
  - id: notify
    agent: hermes_telegram_send
    input: "Envía reporte semanal a Telegram: {{kpis.output}}"
    depends_on: artist_details
