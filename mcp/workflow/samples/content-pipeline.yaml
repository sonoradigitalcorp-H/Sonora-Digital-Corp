name: content-pipeline
description: "Pipeline completo de contenido: idea → generar → revisar → publicar → medir"
steps:
  - id: generate
    agent: content_generate
    input: "Genera contenido sobre {{topic}} usando plantilla {{template}}. Formato: {{format}}."
  - id: score
    agent: skills_system
    input: "Lista skills disponibles para revisar contenido generado"
    depends_on: generate
  - id: deliver
    agent: content_deliver
    input: "Entrega contenido {{generate.output.content_id}} al canal {{channel}}"
    depends_on: score
  - id: measure
    agent: enterprise_score
    input: "Actualiza métricas con nuevo contenido publicado: {{generate.output.content_id}}"
    depends_on: deliver
