name: research-report
steps:
  - id: research
    agent: capability_resolve
    input: "Investiga a fondo: {{topic}}"
  - id: score
    agent: enterprise_score
    input: "Calcula enterprise score actual"
    on_failure: continue
  - id: summarize
    agent: capability_resolve
    input: "Genera resumen ejecutivo de {{research.output}}"
    depends_on: research
