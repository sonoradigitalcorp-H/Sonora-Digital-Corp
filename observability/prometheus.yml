# Prometheus config — SDC Core Monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "mcp-gateway"
    static_configs:
      - targets: ["127.0.0.1:8180"]
    metrics_path: "/metrics"

  - job_name: "hasura"
    static_configs:
      - targets: ["127.0.0.1:8082"]
    metrics_path: "/healthz"

  - job_name: "node"
    static_configs:
      - targets: ["127.0.0.1:9100"]

  - job_name: "docker"
    static_configs:
      - targets: ["127.0.0.1:9323"]

  - job_name: "qdrant"
    static_configs:
      - targets: ["127.0.0.1:6333"]
    metrics_path: "/metrics"

alerting:
  alertmanagers:
    - static_configs:
        - targets: ["127.0.0.1:9093"]

rule_files:
  - "alerts/*.yml"
