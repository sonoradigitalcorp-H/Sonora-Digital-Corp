# SDC Package Registry — Planes y Paquetes
# Layer 1: Combina productos en paquetes facturables
# Layer 2: Skills + Tools requeridas por paquete
# Layer 3: Subscription mapping
# 
# Cada paquete es una combinación de productos del product registry.
# Pricing: suma de productos - descuento por paquete.

packages:

  # ─── FREE TIER ───
  - id: starter-free
    name: Starter Gratis
    tier: free
    price_mxn: 0
    discount: 0
    products:
      - cyber-diagnosis
      - uptime-monitor
    skills_required:
      - audit-security.skill.md
      - monitor-service.skill.md
    tools_required:
      - firecrawl_scrape
      - browser_navigate
    features:
      - 1 diagnóstico gratuito
      - 1 dominio monitoreado
      - Reporte HTML + Audio Mystic
      - Válido 48h
    limits:
      domains: 1
      scans: 1
      calls_month: 0
      clones: 0
    systemd_services: []
    nginx_configs: []

  # ─── SECURITY BUNDLE ───
  - id: security-bundle
    name: Seguridad Total
    tier: pro
    price_mxn: 499
    discount: 150  # descuento por paquete vs comprar individual
    products:
      - cyber-diagnosis
      - ssl-monitor
      - dns-guardian
      - email-guardian
      - uptime-monitor
    skills_required:
      - audit-security.skill.md
      - monitor-service.skill.md
      - scan.py
      - report.py
    tools_required:
      - firecrawl_scrape
      - browser_navigate
      - llm_chat
      - engram_save
    features:
      - Diagnóstico semanal automático
      - Monitoreo SSL + DNS + Email
      - Alertas WhatsApp en tiempo real
      - Dashboard de seguridad
      - Hasta 5 dominios
      - Risk Management Plan mensual
    limits:
      domains: 5
      scans: 999
      calls_month: 0
      clones: 0
    systemd_services:
      - sdc-api-bridge.service
      - ops-agent.service
    nginx_configs:
      - /etc/nginx/sites-available/sonora-landing

  # ─── AI AGENTS BUNDLE ───
  - id: ai-bundle
    name: Agentes IA
    tier: pro
    price_mxn: 799
    discount: 299
    products:
      - call-engine-mini
      - whatsapp-agent-mini
      - uptime-monitor
    skills_required:
      - wacli
      - hermes-gateway
      - deploy-code.skill.md
      - monitor-service.skill.md
    tools_required:
      - omnivoice_speak
      - llm_chat
      - stripe_create_checkout
      - engram_save
      - browser_navigate
    features:
      - Call Engine: 500 llamadas/mes
      - WhatsApp Agent: respuestas ilimitadas
      - Catálogo de productos + pagos MP/Stripe
      - Dashboard de métricas en vivo
      - 1 agente IA dedicado
    limits:
      domains: 3
      scans: 0
      calls_month: 500
      clones: 0
    systemd_services:
      - hermes
      - hermes-dashboard
      - event-listener.service
    nginx_configs:
      - /etc/nginx/sites-available/sonora-landing

  # ─── CLONE BUNDLE ───
  - id: clone-bundle
    name: Clone Digital
    tier: pro
    price_mxn: 699
    discount: 200
