networks:
  sdc-network:
    name: sdc-network
    driver: bridge

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  n8n_data:

services:
  postgres:
    image: postgres:16-alpine
    container_name: sdc-postgres
    networks:
      - sdc-network
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-sdc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sdc_secret_2026}
      POSTGRES_DB: ${POSTGRES_DB:-sonora}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdc -d sonora"]
      interval: 10s
      timeout: 5s
      retries: 5

  hasura:
    image: hasura/graphql-engine:v2.44.0
    container_name: sdc-hasura
    networks:
      - sdc-network
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HASURA_GRAPHQL_DATABASE_URL: postgres://${POSTGRES_USER:-sdc}:${POSTGRES_PASSWORD:-sdc_secret_2026}@postgres:5432/${POSTGRES_DB:-sonora}
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true"
      HASURA_GRAPHQL_DEV_MODE: ${HASURA_DEV_MODE:-true}
      HASURA_GRAPHQL_ADMIN_SECRET: ${HASURA_ADMIN_SECRET:-sdc_hasura_secret}
      HASURA_GRAPHQL_UNAUTHORIZED_ROLE: anonymous
      HASURA_GRAPHQL_ENABLE_REMOTE_SCHEMAS: "true"
      HASURA_GRAPHQL_ENABLE_EVENT_TRIGGERS: "true"
      HASURA_GRAPHQL_ENABLE_REMOTE_SCHEMA_PERMISSIONS: "true"
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.10.0
    container_name: sdc-qdrant
    networks:
      - sdc-network
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: sdc-redis
    networks:
      - sdc-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

