name: nathy-nominas-agent
description: "Agente de nóminas — CFDI nómina 4.0, percepciones, deducciones, finiquitos, PRONAF"
model: opencode/deepseek-v4-flash-free
provider: opencode
capability: payroll-management
maturity: 2-Assisted
tools:
  - sonora:nomina_generar
  - sonora:nomina_incidencias
  - sonora:nomina_finiquito
  - sonora:nomina_pronaf
  - sonora:enterprise_score
policies:
  max_tokens_per_call: 4096
  timeout_seconds: 60
events:
  emits: [accounting:nomina:generar, accounting:nomina:incidencia]
  listens: [whatsapp:message:received]
lifecycle:
  spawn: on-demand
  max_idle: 15m
  max_concurrent: 3
