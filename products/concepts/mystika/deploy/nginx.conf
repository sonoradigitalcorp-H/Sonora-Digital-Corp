# Mystika — nginx Configuration
# Deploy to: /etc/nginx/sites-available/mystika.app

server {
    listen 80;
    server_name mystika.app;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name mystika.app;

    ssl_certificate /etc/letsencrypt/live/mystika.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mystika.app/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;

    root /var/www/mystika/web;
    index index.html;

    # Next.js frontend
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # API backend
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Increase body size for video uploads
        client_max_body_size 2G;
    }

    # Protected video files (served via X-Accel-Redirect)
    location /protected/ {
        internal;
        alias /data/videos/mystika/;
        add_header Cache-Control "private, no-transform";

        # Optional: JWT validation via auth_request
        # auth_request /api/media/validate;
        # auth_request_set $auth_status $upstream_status;
    }

    # Optional: Stream thumbnails and previews
    location /media/preview/ {
        alias /data/videos/mystika/previews/;
        add_header Cache-Control "public, max-age=86400";
        expires 1d;
    }

    # Deny access to sensitive files
    location ~ /\.(env|git|sql|md) {
        deny all;
        return 404;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
}
