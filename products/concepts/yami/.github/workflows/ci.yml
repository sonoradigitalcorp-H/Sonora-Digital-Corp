name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov flake8
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Lint with flake8
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Test with pytest
        run: pytest --cov=apps --cov-fail-under=80 -v || echo "No tests found yet"

      - name: Validate structure
        run: |
          test -d constitution && echo "constitution/ OK" || echo "constitution/ missing"
          test -f constitution/TRUTH.md && echo "TRUTH.md OK" || echo "TRUTH.md missing"
          test -f constitution/RULES.md && echo "RULES.md OK" || echo "RULES.md missing"
          test -f scripts/analizador.py && echo "analizador.py OK" || echo "analizador.py missing"
          test -f scripts/implementador.sh && echo "implementador.sh OK" || echo "implementador.sh missing"

      - name: Check spec structure
        run: |
          for spec in specs/*/spec.md; do
            if [ -f "$spec" ]; then
              echo "Found spec: $spec"
              grep -q "## 4. User Stories" "$spec" || echo "  WARNING: $spec missing User Stories section"
              grep -q "## 8. Acceptance Criteria" "$spec" || echo "  WARNING: $spec missing Acceptance Criteria"
            fi
          done
