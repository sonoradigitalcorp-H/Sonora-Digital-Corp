<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sonora Tracker — Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
:root {
  --bg: #0a0a0f;
  --surface: #13131a;
  --card: #1a1a24;
  --border: #2a2a3e;
  --primary: #6366f1;
  --primary-glow: rgba(99,102,241,.25);
  --accent: #22d3ee;
  --green: #10b981;
  --yellow: #f59e0b;
  --red: #ef4444;
  --text: #e2e8f0;
  --text-dim: #94a3b8;
  --radius: 12px;
}
body { font-family: Inter, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.app { max-width: 1280px; margin: 0 auto; padding: 24px 32px; }

.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
.header h1 { font-size: 24px; font-weight: 700; }
.header h1 span { color: var(--primary); }
.header .subtitle { color: var(--text-dim); font-size: 14px; margin-top: 4px; }
.back-link { color: var(--text-dim); text-decoration: none; font-size: 14px; display: inline-flex; align-items: center; gap: 6px; transition: .2s; }
.back-link:hover { color: var(--primary); }

.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 20px; transition: .2s;
}
.card:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
.card .label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.card .value { font-size: 28px; font-weight: 700; }
.card .value.green { color: var(--green); }
.card .value.accent { color: var(--accent); }
.card .value.primary { color: var(--primary); }
.card .value.yellow { color: var(--yellow); }

.dual-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
@media(max-width:1024px){ .dual-grid { grid-template-columns: 1fr; } }

.section { margin-bottom: 32px; }
.section h2 { font-size: 18px; font-weight: 600; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
.section h2 .badge { font-size: 12px; background: var(--primary); color: #fff; padding: 2px 10px; border-radius: 12px; font-weight: 500; }

.status-badge {
  display: inline-block; padding: 3px 12px; border-radius: 12px; font-size: 11px; font-weight: 600;
}
.status-badge.queued { background: #6366f133; color: var(--primary); }
.status-badge.processing { background: #f59e0b33; color: var(--yellow); }
.status-badge.completed { background: #22d3ee33; color: var(--accent); }
.status-badge.delivered { background: #10b98133; color: var(--green); }
.status-badge.cancelled { background: #ef444433; color: var(--red); }

.order-card {
  background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
  padding: 16px; margin-bottom: 12px; cursor: pointer; transition: .2s;
}
.order-card:hover { border-color: var(--primary); box-shadow: 0 0 20px var(--primary-glow); }
.order-card .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.order-card .order-id { font-weight: 700; font-size: 14px; color: var(--primary); }
.order-card .client { font-size: 13px; color: var(--text-dim); }
.order-card .detail { font-size: 13px; color: var(--text-dim); margin-top: 4px; }
.order-card .detail strong { color: var(--text); }

.order-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); display: none; }
.order-detail.open { display: block; }

.timeline { margin: 12px 0; padding-left: 16px; border-left: 2px solid var(--border); }
.timeline-item { position: relative; padding: 8px 0 8px 16px; font-size: 13px; }
.timeline-item::before { content: ''; position: absolute; left: -7px; top: 12px; width: 10px; height: 10px; border-radius: 50%; background: var(--border); }
.timeline-item.current::before { background: var(--primary); box-shadow: 0 0 8px var(--primary-glow); }
.timeline-item .tl-status { font-weight: 600; text-transform: capitalize; }
.timeline-item .tl-time { color: var(--text-dim); font-family: monospace; font-size: 11px; }
.timeline-item .tl-note { color: var(--text-dim); margin-top: 2px; }

.form-group { margin-bottom: 14px; }
.form-group label { display: block; font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
.form-group input, .form-group select, .form-group textarea {
  width: 100%; padding: 10px 12px; background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text); font-family: Inter; font-size: 14px; transition: .2s;
}
.form-group input:focus, .form-group select:focus, .form-group textarea:focus {
  outline: none; border-color: var(--primary); box-shadow: 0 0 12px var(--primary-glow);
}
.form-group textarea { resize: vertical; min-height: 60px; }

.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px; border-radius: 8px;
  font-family: Inter; font-size: 14px; font-weight: 600; border: none; cursor: pointer; transition: .2s;
}
.btn-primary { background: var(--primary); color: #fff; }
.btn-primary:hover { background: #4f46e5; box-shadow: 0 0 16px var(--primary-glow); }
.btn-accent { background: var(--accent); color: #000; }
.btn-accent:hover { background: #0fc; }
.btn-sm { padding: 6px 14px; font-size: 12px; }

.empty { text-align: center; padding: 40px; color: var(--text-dim); }
.empty .icon { font-size: 48px; margin-bottom: 12px; opacity: .4; }

.toast {
  position: fixed; top: 24px; right: 24px; padding: 12px 20px; border-radius: 8px;
  font-size: 14px; z-index: 999; animation: slideIn .3s ease; max-width: 360px;
}
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div>
      <a class="back-link" href="/">← Back to home</a>
      <h1><span>◈</span> Tracker Dashboard</h1>
      <div class="subtitle">Client-facing order tracking · real-time updates</div>
    </div>
    <div id="ws-indicator" style="display:flex;align-items:center;gap:8px;font-size:13px;color:var(--green)"><span style="width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite"></span> Live</div>
  </div>

  <div class="grid" id="stats-cards"></div>

  <div class="dual-grid">
    <div class="section">
      <h2>Orders <span class="badge" id="orders-count">0</span></h2>
      <div id="orders-list"></div>
    </div>
    <div class="section">
      <h2>New Order</h2>
      <div class="card">
        <div class="form-group">
          <label>Client ID</label>
          <input id="order-client" placeholder="e.g. ref-abc123">
        </div>
        <div class="form-group">
          <label>Service Type</label>
          <select id="order-service">
            <option value="photo">Photo</option>
            <option value="video">Video</option>
            <option value="voice">Voice</option>
            <option value="clone">Clone</option>
            <option value="social">Social</option>
          </select>
        </div>
        <div class="form-group">
          <label>Description</label>
          <textarea id="order-desc" placeholder="Describe the order..."></textarea>
        </div>
        <div class="form-group">
          <label>Tokens Cost</label>
          <input id="order-cost" type="number" value="0" min="0">
        </div>
        <button class="btn btn-primary" onclick="createOrder()">+ Create Order</button>
      </div>
    </div>
  </div>
</div>

<script>
const API = `http://localhost:6300`;
let wsConnections = {};

async function fetchJSON(path, opts) {
  try {
    const r = await fetch(`${API}${path}`, { ...opts, headers: { 'Content-Type': 'application/json', ...opts?.headers } });
    if (!r.ok) { const e = await r.json().catch(()=>{}); throw new Error(e?.detail || r.statusText); }
    return await r.json();
  } catch(e) { console.warn('fetch failed:', path, e); return null; }
}

function $(id) { return document.getElementById(id); }

function toast(msg, type = 'success') {
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

// ─── Stats ───
async function loadStats() {
  const data = await fetchJSON(`/tracker/stats`);
  if (!data) return;
  const byStatus = data.by_status || {};
  const total = data.total || 0;
  $('stats-cards').innerHTML = [
    { label: 'Total Orders', value: total, cls: '' },
    { label: 'Queued', value: byStatus.queued || 0, cls: 'primary' },
    { label: 'Processing', value: byStatus.processing || 0, cls: 'yellow' },
    { label: 'Completed', value: byStatus.completed || 0, cls: 'accent' },
    { label: 'Delivered', value: byStatus.delivered || 0, cls: 'green' },
  ].map(c => `
    <div class="card">
      <div class="label">${c.label}</div>
      <div class="value ${c.cls}">${c.value}</div>
    </div>
  `).join('');
}

// ─── Orders ───
async function loadOrders() {
  const data = await fetchJSON(`/tracker/orders`);
  if (!data) return;
  const orders = data.orders || [];
  $('orders-count').textContent = data.total || 0;
  if (!orders.length) {
    $('orders-list').innerHTML = '<div class="empty"><div class="icon">📦</div>No orders yet</div>';
    return;
  }
  const openId = document.querySelector('.order-detail.open')?.dataset?.orderId;
  $('orders-list').innerHTML = orders.map(o => {
    const history = o.status_history || [];
    const lastStatus = history.length ? history[history.length - 1] : null;
    return `
      <div class="order-card" onclick="toggleOrder('${o.id}')">
        <div class="top">
          <span class="order-id">${o.id}</span>
          <span class="status-badge ${o.status}">${o.status}</span>
        </div>
        <div class="client">${o.client_id}</div>
        <div class="detail"><strong>${o.service_type || 'N/A'}</strong> · ${o.description ? o.description.slice(0, 60) : ''}${o.description?.length > 60 ? '...' : ''}</div>
        <div class="order-detail ${openId === o.id ? 'open' : ''}" data-order-id="${o.id}">
          <div style="display:flex;gap:8px;margin-bottom:8px">
            <button class="btn btn-accent btn-sm" onclick="event.stopPropagation();nextStatus('${o.id}')">Next Status →</button>
            ${o.delivery_url ? `<a href="${o.delivery_url}" target="_blank" class="btn btn-sm" style="background:var(--green);color:#fff;text-decoration:none">📎 Delivery</a>` : ''}
          </div>
          <div class="timeline">
            ${history.map((h, i) => `
              <div class="timeline-item ${i === history.length - 1 ? 'current' : ''}">
                <div class="tl-status">${h.status}</div>
                <div class="tl-time">${(h.at || '').slice(0, 19) || '—'}</div>
                ${h.note ? `<div class="tl-note">${h.note}</div>` : ''}
              </div>
            `).join('')}
          </div>
          ${o.assigned_agent ? `<div style="font-size:12px;color:var(--text-dim)">Agent: ${o.assigned_agent}</div>` : ''}
          <div style="font-size:12px;color:var(--text-dim);margin-top:4px">Created: ${(o.created_at || '').slice(0, 19)}</div>
        </div>
      </div>
    `;
  }).join('');
  orders.forEach(o => connectWS(o.id));
}

function toggleOrder(id) {
  const allDetails = document.querySelectorAll('.order-detail');
  allDetails.forEach(d => { if (d.dataset.orderId === id) { d.classList.toggle('open'); } else { d.classList.remove('open'); } });
}

async function createOrder() {
  const client_id = $('order-client').value.trim();
  if (!client_id) { toast('Client ID is required', 'error'); return; }
  const service_type = $('order-service').value;
  const description = $('order-desc').value.trim();
  const tokens_cost = parseInt($('order-cost').value) || 0;
  const res = await fetchJSON(`/tracker/orders`, {
    method: 'POST',
    body: JSON.stringify({ client_id, service_type, description, tokens_cost, tenant: 'default' }),
  });
  if (res && res.ok) {
    toast('Order created: ' + res.order.id);
    $('order-client').value = ''; $('order-desc').value = ''; $('order-cost').value = '0';
    loadAll();
  } else {
    toast('Failed to create order', 'error');
  }
}

async function nextStatus(id) {
  const res = await fetchJSON(`/tracker/orders/${id}/next`, { method: 'POST', body: JSON.stringify({}) });
  if (res && res.ok) { toast('Status advanced → ' + res.order.status); loadAll(); }
  else { toast('Cannot advance — order may be final or cancelled', 'error'); }
}

// ─── WebSocket ───
function connectWS(orderId) {
  if (wsConnections[orderId]) return;
  try {
    const ws = new WebSocket(`ws://localhost:6300/tracker/ws/${orderId}`);
    ws.onopen = () => { wsConnections[orderId] = ws; };
    ws.onclose = () => { delete wsConnections[orderId]; setTimeout(() => connectWS(orderId), 3000); };
    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.event === 'order:updated') { loadAll(); }
      } catch(_) {}
    };
    ws.onerror = () => {};
  } catch(_) {}
}

// ─── Init ───
async function loadAll() {
  await Promise.all([loadStats(), loadOrders()]);
}
loadAll();
setInterval(loadAll, 10000);
</script>
</body>
</html>
