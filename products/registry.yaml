# SDC Product Registry — Catálogo de Mini Servicios / Productos / Agentes
# Cada entrada es un producto facturable, combinable, con skills asociadas.
# Cache, cookies, auth y FAQs documentados por producto.

products:

  - id: cyber-diagnosis
    name: Cyber Diagnosis Express
    entity: Mystic Security Agent
    tagline: "Auditoría de ciberseguridad express con audio + reporte"
    category: security
    tier: [free, pro, enterprise]
    price_mxn: {free: 0, pro: 299, enterprise: 999}
    skills: [audit-security.skill.md, scan.py, report.py, voice.py]
    features:
      - 8 verificaciones (DNS, SSL, headers, puertos, email)
      - Reporte FOMO + Risk Management Plan
      - Audio Mystic (voz Dalia Neural)
      - Campañas de marketing por nicho
    triggers: [command:/sdc cyber scan, command:/sdc cyber campaign]
    events: [cyber.scan.started, cyber.scan.completed, cyber.audio.generated]
    cache: "Cache-Control: no-cache"
    cookies: "session: HTTP-only, SameSite=Strict, 1h"
    auth: "Free: sin auth. Pro: API key. Enterprise: JWT"
    faqs:
      - p: "¿Qué datos necesito?"
        r: "Solo el dominio de tu empresa (ej: empresa.com)"
      - p: "¿Cuánto tarda?"
        r: "30 segundos de scan, 2 minutos el reporte"

  - id: ssl-monitor
    name: SSL Guardian
    entity: Certificate Watcher
    tagline: "Monitoreo de certificados SSL/TLS con alertas 24/7"
    category: security
    tier: [pro, enterprise]
    price_mxn: {pro: 99, enterprise: 299}
    skills: [monitor-service.skill.md, scan.py]
    features:
      - Monitoreo diario de vigencia SSL
      - Alerta 30, 14, 7 y 1 día antes de expirar
      - Detección de TLS 1.0/1.1
      - Dashboard de estado
    triggers: [cron:0 6 * * *, event:ssl.cert_expiring]
    events: [ssl.cert_valid, ssl.cert_expiring, ssl.cert_expired]
    cache: "Cache-Control: max-age=3600"
    cookies: "session: HTTP-only, SameSite=Strict"
    auth: API key
    faqs:
      - p: "¿Cuántos dominios?"
        r: "Pro: hasta 5. Enterprise: ilimitados"

  - id: dns-guardian
    name: DNS Guardian
    entity: Domain Protector
    tagline: "Protección DNS contra spoofing y phishing"
    category: security
    tier: [pro, enterprise]
    price_mxn: {pro: 149, enterprise: 399}
    skills: [scan.py, report.py]
    features:
      - Verificación DNSSEC
      - Monitoreo SPF/DKIM/DMARC
      - Detección de cambios no autorizados
    triggers: [cron:*/30 * * * *, event:dns.change_detected]
    events: [dns.verified, dns.change_detected, dns.spoof_attempt]
    cache: "TTL 300"
    cookies: "solo session"
    auth: API key

  - id: email-guardian
    name: Email Guardian
    entity: Anti-Phishing Agent
    tagline: "Protección contra spoofing de correo corporativo"
    category: security
    tier: [pro, enterprise]
    price_mxn: {pro: 149, enterprise: 399}
    skills: [scan.py]
    triggers: [cron:0 8 * * 1]
    events: [email.spf_valid, email.dmarc_warning]

  - id: call-engine-mini
    name: Call Engine Mini
    entity: TeleSales Agent
    tagline: "Agente de llamadas IA que vende por ti"
    category: ai
    tier: [pro, enterprise]
    price_mxn: {pro: 499, enterprise: 999}
    skills: [call-engine, voice.py]
