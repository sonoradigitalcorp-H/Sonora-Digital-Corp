    triggers: [command:/sdc call, event:lead.new]
    events: [call.started, call.completed, lead.scored]
    auth: JWT + API key

  - id: super-seller-agent
    name: Super Seller Agent
    entity: Vendedor IA Contextual
    tagline: "Agente de ventas IA con contexto completo de productos, paquetes y precios"
    category: ai
    tier: [pro, enterprise]
    price_mxn: {pro: 799, enterprise: 1499}
    skills: [call-engine, voice.py, engine.py, products/engine.py]
    features:
      - Conoce todos los productos, paquetes y precios
      - Contexto completo del negocio (FAQ, casos de éxito)
      - Voz + Chat inteligente (Mystic)
      - Responde en el tono de cada plataforma
      - Detecta intención y upselling automático
      - Integración con redes sociales (DM responder)
      - Captura leads automáticamente
      - Trigger "Sonora" para beneficios freemium
    triggers: [always:available, event:social.mention, event:lead.new]
    events: [seller.call_started, seller.deal_closed, seller.lead_captured]
    cache: "Cache-Control: no-cache (tiempo real)"
    cookies: "session + prefs_chat: SameSite=Lax, 30d"
    auth: JWT + API key
    faqs:
      - p: "¿Qué sabe el Super Seller?"
        r: "Todo: productos, precios, paquetes, FAQ, casos de éxito, ciberseguridad, IA. Responde en contexto."
      - p: "¿Habla por teléfono?"
        r: "Sí. Llama, califica leads, cierra ventas. Voz humana (Dalia Neural)."

