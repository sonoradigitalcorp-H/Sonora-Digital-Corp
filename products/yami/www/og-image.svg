<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1a2e"/>
      <stop offset="50%" stop-color="#1a2d46"/>
      <stop offset="100%" stop-color="#0f1a2e"/>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d8f7d" stop-opacity="0"/>
      <stop offset="30%" stop-color="#2d8f7d"/>
      <stop offset="50%" stop-color="#d46a7a"/>
      <stop offset="70%" stop-color="#c48a4a"/>
      <stop offset="100%" stop-color="#c48a4a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03">
    <line x1="0" y1="100" x2="1200" y2="100" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="200" x2="1200" y2="200" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="300" x2="1200" y2="300" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="400" x2="1200" y2="400" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="0" y1="500" x2="1200" y2="500" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="630" stroke="#ffffff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="630" stroke="#ffffff" stroke-width="0.5"/>
  </g>

  <!-- Kanji accent -->
  <text x="1080" y="100" font-family="'Noto Sans JP', serif" font-size="48" fill="#2d8f7d" opacity="0.15" text-anchor="end">闇</text>

  <!-- Brand -->
  <text x="80" y="120" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f5f0e8" letter-spacing="2">YAMI.</text>

  <!-- Main headline -->
  <text x="80" y="310" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="#f5f0e8" font-weight="700" letter-spacing="1">
    Antes de que sea crisis,
  </text>
  <text x="80" y="380" font-family="Georgia, 'Times New Roman', serif" font-size="56" fill="#c48a4a" font-style="italic" letter-spacing="1">
    que sea conversación.
  </text>

  <!-- Gradient line -->
  <rect x="80" y="420" width="1040" height="2" fill="url(#line)"/>

  <!-- Layers -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-weight="600" letter-spacing="3">
    <text x="80" y="480" font-size="22" fill="#2d8f7d">MIRU</text>
    <text x="170" y="478" font-size="28" fill="#475569" font-weight="300">·</text>
    <text x="200" y="480" font-size="22" fill="#d46a7a">KIKU</text>
    <text x="295" y="478" font-size="28" fill="#475569" font-weight="300">·</text>
    <text x="325" y="480" font-size="22" fill="#c48a4a">TOMONI</text>
  </g>

  <!-- Layer labels -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#94a3b8" letter-spacing="1">
    <text x="80" y="505">Evaluación</text>
    <text x="200" y="505">Acompañamiento</text>
    <text x="325" y="505">Comunidad</text>
  </g>

  <!-- URL -->
  <text x="80" y="570" font-family="'Segoe UI', Arial, sans-serif" font-size="14" fill="#64748b" letter-spacing="1">yami-mx.vercel.app</text>
</svg>
