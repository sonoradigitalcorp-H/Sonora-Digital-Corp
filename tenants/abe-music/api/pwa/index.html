<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a12">
<title>ABE Music OS</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="logo">ABE Music OS</div>
    <nav>
      <button class="nav-btn active" data-view="chat">Chat</button>
      <button class="nav-btn" data-view="dashboard">Dashboard</button>
      <button class="nav-btn" data-view="artists">Artistas</button>
      <button class="nav-btn" data-view="contracts">Contratos</button>
      <button class="nav-btn" data-view="revenue">Revenue</button>
      <button class="nav-btn" data-view="fans">Fans</button>
    </nav>
    <div class="sidebar-footer">
      <select id="role-select">
        <option value="ceo">CEO</option>
        <option value="director" selected>Director</option>
        <option value="artista">Artista</option>
        <option value="fan">Fan</option>
      </select>
    </div>
  </aside>
  <main id="main-content">
    <div id="view-chat" class="view active">
      <div id="chat-header">
        <h2>ABE Assistant</h2>
        <span id="voice-status" class="status-dot offline"></span>
      </div>
      <div id="chat-messages"></div>
      <div id="chat-input-area">
        <button id="voice-btn" title="Voice input">&#x1f3a4;</button>
        <input type="text" id="chat-input" placeholder="Escribe o usa voz..." autofocus>
        <button id="send-btn">Enviar</button>
      </div>
    </div>
    <div id="view-dashboard" class="view"></div>
    <div id="view-artists" class="view"></div>
    <div id="view-contracts" class="view"></div>
    <div id="view-revenue" class="view"></div>
    <div id="view-fans" class="view"></div>
  </main>
</div>
<script src="app.js"></script>
</body>
</html>
