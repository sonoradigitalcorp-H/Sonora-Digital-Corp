rules:
  - id: CODE-001
    description: "No comentarios en código — el código debe ser auto-documentado"
    category: style
    severity: warning
    applies_to: ["python", "javascript"]
    enforcement: review

  - id: CODE-002
    description: "Máximo 3 oraciones por respuesta al usuario — directo, sin explicaciones"
    category: communication
    severity: error
    applies_to: ["all_agents"]
    enforcement: automated

  - id: CODE-003
    description: "No emojis en archivos de código — solo en comunicación si el usuario lo pide"
    category: style
    severity: warning
    applies_to: ["all_agents"]
    enforcement: review

  - id: CODE-004
    description: "Usar funciones con DOCSTRING que referencia FR correspondiente"
    category: documentation
    severity: warning
    applies_to: ["python"]
    enforcement: review

